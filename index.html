<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>家厨点菜</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    /* ===== 全局重置与变量 ===== */
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    :root {
      --primary: #FF6B35;
      --primary-light: #FFF0EB;
      --primary-soft: #FFE4D6;
      --green: #52C41A;
      --green-light: #F0FFF4;
      --pink: #FF4D6D;
      --pink-light: #FFE9EE;
      --blue: #1890FF;
      --blue-light: #E6F4FF;
      --gold: #FAAD14;
      --gold-light: #FFF7E6;
      --bg: #F7F8FA;
      --card: #FFFFFF;
      --text: #1A1A1A;
      --text-2: #666666;
      --text-3: #999999;
      --border: #F0F0F0;
      --radius: 16px;
      --radius-sm: 10px;
      --shadow: 0 2px 12px rgba(0,0,0,0.06);
      --shadow-card: 0 4px 20px rgba(0,0,0,0.08);
      --nav-h: 68px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      font-family: -apple-system, 'PingFang SC', 'Helvetica Neue', sans-serif;
      color: var(--text);
      font-size: 15px;
      line-height: 1.5;
      overflow: hidden;
    }

    #root { height: 100%; display: flex; flex-direction: column; max-width: 430px; margin: 0 auto; position: relative; background: var(--bg); }

    .page-scroll {
      flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
      padding-bottom: calc(var(--nav-h) + var(--safe-bottom) + 16px);
    }
    .page-scroll::-webkit-scrollbar { display: none; }

    .bottom-nav {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 430px;
      height: calc(var(--nav-h) + var(--safe-bottom));
      background: white; border-top: 1px solid var(--border);
      display: flex; align-items: flex-start; padding-top: 8px;
      z-index: 100; box-shadow: 0 -2px 12px rgba(0,0,0,0.04);
    }
    .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; padding: 4px 0; transition: all 0.2s; }
    .nav-icon { font-size: 22px; line-height: 1; }
    .nav-label { font-size: 11px; color: var(--text-3); font-weight: 500; }
    .nav-item.active .nav-label { color: var(--primary); font-weight: 600; }
    .nav-item.active .nav-icon { transform: scale(1.1); }

    .page-header { padding: 16px 20px 12px; background: white; position: sticky; top: 0; z-index: 50; }
    .page-title { font-size: 20px; font-weight: 700; color: var(--text); }
    .page-subtitle { font-size: 13px; color: var(--text-3); margin-top: 2px; }

    .card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); }

    .btn-primary {
      background: var(--primary); color: white; border: none; border-radius: 24px;
      font-size: 15px; font-weight: 600; padding: 12px 28px; cursor: pointer;
      transition: all 0.2s; width: 100%;
    }
    .btn-primary:active { opacity: 0.85; transform: scale(0.98); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-outline {
      background: transparent; color: var(--primary);
      border: 1.5px solid var(--primary); border-radius: 24px;
      font-size: 14px; font-weight: 500; padding: 8px 20px; cursor: pointer;
    }

    .tab-bar { display: flex; gap: 8px; padding: 0 20px 12px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .tab-bar::-webkit-scrollbar { display: none; }
    .tab-chip {
      flex-shrink: 0; padding: 6px 16px; border-radius: 20px;
      font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s;
      background: white; color: var(--text-2); border: 1.5px solid var(--border);
    }
    .tab-chip.active { background: var(--primary); color: white; border-color: var(--primary); }

    .search-bar {
      margin: 12px 20px; background: white; border-radius: 24px;
      display: flex; align-items: center; padding: 10px 16px; gap: 8px;
      box-shadow: var(--shadow);
    }
    .search-bar input { flex: 1; border: none; outline: none; font-size: 15px; color: var(--text); background: transparent; }
    .search-bar input::placeholder { color: var(--text-3); }

    .dish-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 20px 12px; }
    .dish-card {
      background: white; border-radius: var(--radius); overflow: hidden;
      box-shadow: var(--shadow); transition: transform 0.15s; position: relative;
    }
    .dish-card:active { transform: scale(0.97); }
    .dish-img {
      width: 100%; aspect-ratio: 1;
      background: linear-gradient(135deg, #FFE4D6 0%, #FFF0EB 100%);
      font-size: 52px; display: flex; align-items: center; justify-content: center;
      overflow: hidden; position: relative;
    }
    .dish-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .dish-info { padding: 10px 12px 12px; }
    .dish-name { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 4px; display: flex; align-items: center; gap: 4px; flex-wrap: wrap;}
    .dish-meta { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; margin-bottom: 6px; min-height: 16px; }
    .dish-cat { font-size: 11px; color: var(--text-3); }
    .dish-actions { display: flex; align-items: center; justify-content: space-between; margin-top: 8px; gap: 4px; }
    .dish-vote { display: flex; gap: 4px; }
    .vote-btn {
      background: var(--bg); border: 1.5px solid transparent; border-radius: 14px;
      font-size: 11px; padding: 3px 7px; cursor: pointer;
      display: inline-flex; align-items: center; gap: 2px;
      transition: all 0.2s; color: var(--text-2);
    }
    .vote-btn.up.active { background: var(--green-light); color: var(--green); border-color: var(--green); font-weight: 600; }
    .vote-btn.down.active { background: var(--pink-light); color: var(--pink); border-color: var(--pink); font-weight: 600; }
    .vote-btn:active { transform: scale(0.92); }
    .btn-add {
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--primary); color: white; border: none; font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s; line-height: 1; flex-shrink: 0;
    }
    .btn-add.added { background: var(--green); }
    .btn-add:active { transform: scale(0.88); }
    .dish-badge {
      position: absolute; top: 8px; right: 8px;
      background: var(--primary); color: white; border-radius: 10px;
      font-size: 11px; font-weight: 700; padding: 2px 7px; z-index: 2;
    }
    .dish-recent-warn {
      position: absolute; top: 8px; left: 8px;
      background: rgba(255, 173, 20, 0.95); color: white;
      border-radius: 10px; font-size: 10px; font-weight: 600;
      padding: 2px 6px; z-index: 2;
    }
    .dish-both-want {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: linear-gradient(90deg, #FF4D6D, #FF6B35);
      color: white; font-size: 10px; font-weight: 600;
      text-align: center; padding: 3px 0; z-index: 2;
    }
    .dish-i-want {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: rgba(82, 196, 26, 0.92); color: white;
      font-size: 10px; font-weight: 600;
      text-align: center; padding: 3px 0; z-index: 2;
    }

    .tag-mini {
      font-size: 10px; padding: 1px 6px; border-radius: 6px;
      background: var(--bg); color: var(--text-2); font-weight: 500;
      display: inline-flex; align-items: center; gap: 2px; line-height: 1.4;
    }
    .tag-mini.spicy-1 { background: #FFF7E6; color: #FAAD14; }
    .tag-mini.spicy-2 { background: #FFF1E6; color: #FA8C16; }
    .tag-mini.spicy-3 { background: #FFE4D6; color: #FF6B35; }
    .tag-mini.spicy-4 { background: #FFE0E0; color: #FF4D4F; font-weight: 700; }

    .float-bar {
      position: fixed; bottom: calc(var(--nav-h) + var(--safe-bottom) + 12px);
      left: 50%; transform: translateX(-50%);
      width: calc(100% - 40px); max-width: 390px;
      background: var(--text); border-radius: 20px;
      padding: 14px 20px; display: flex;
      align-items: center; justify-content: space-between;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
      z-index: 90; animation: slideUp 0.25s ease;
    }
    @keyframes slideUp { from { transform: translateX(-50%) translateY(20px); opacity: 0; } to { transform: translateX(-50%) translateY(0); opacity: 1; } }
    .float-bar-left { display: flex; align-items: center; gap: 12px; }
    .float-count {
      background: var(--primary); color: white; border-radius: 50%;
      width: 26px; height: 26px; font-size: 13px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
    }
    .float-label { color: white; font-size: 14px; font-weight: 500; }
    .float-btn {
      background: var(--primary); color: white; border: none;
      border-radius: 20px; padding: 8px 20px;
      font-size: 14px; font-weight: 600; cursor: pointer;
    }

    .shake-inline-btn {
      display: inline-flex; align-items: center; gap: 6px;
      background: linear-gradient(135deg, #FF6B35 0%, #FF4D6D 100%);
      color: white; border: none; cursor: pointer;
      padding: 8px 14px; border-radius: 20px;
      font-size: 13px; font-weight: 700;
      box-shadow: 0 4px 12px rgba(255, 107, 53, 0.35);
      transition: transform 0.15s;
    }
    .shake-inline-btn:active { transform: scale(0.92); }
    .shake-inline-btn.shaking span:first-child { animation: shake 0.35s ease infinite; display: inline-block; }
    @keyframes shake { 0%,100% { transform: rotate(0deg);} 25% { transform: rotate(-15deg);} 75% { transform: rotate(15deg);} }

    .today-hero {
      margin: 16px 20px;
      background: linear-gradient(135deg, #FF6B35 0%, #FF8C5A 100%);
      border-radius: 20px; padding: 24px;
      color: white; position: relative; overflow: hidden;
    }
    .today-hero::after { content: '🍳'; position: absolute; right: 20px; bottom: 10px; font-size: 64px; opacity: 0.2; }
    .today-date { font-size: 13px; opacity: 0.85; margin-bottom: 4px; }
    .today-title { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
    .today-sub { font-size: 13px; opacity: 0.75; }
    .today-chef-row {
      margin-top: 14px; padding-top: 14px; border-top: 1px solid rgba(255,255,255,0.2);
      display: flex; align-items: center; justify-content: space-between;
      position: relative; z-index: 1;
    }
    .today-chef-label { font-size: 12px; opacity: 0.85; }
    .today-chef-name { font-size: 15px; font-weight: 700; margin-top: 2px; }
    .today-chef-btn {
      background: rgba(255,255,255,0.25); color: white;
      border: 1.5px solid rgba(255,255,255,0.4); border-radius: 16px;
      padding: 5px 12px; font-size: 12px; font-weight: 600; cursor: pointer;
    }

    .menu-list { padding: 0 20px; display: flex; flex-direction: column; gap: 10px; }
    .menu-item {
      background: white; border-radius: var(--radius-sm);
      padding: 14px 16px; display: flex; align-items: center;
      gap: 12px; box-shadow: var(--shadow);
    }
    .menu-item-name { font-size: 15px; font-weight: 600; flex: 1; }
    .menu-item-cat { font-size: 12px; color: var(--text-3); }
    .remove-btn { background: none; border: none; font-size: 20px; color: var(--text-3); cursor: pointer; padding: 4px; }
    .empty-state { text-align: center; padding: 60px 20px; color: var(--text-3); }
    .empty-state .emoji { font-size: 56px; margin-bottom: 12px; }
    .empty-state p { font-size: 15px; }
    .section-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px 10px; }
    .section-title { font-size: 16px; font-weight: 700; }
    .section-action { font-size: 13px; color: var(--primary); cursor: pointer; }

    .both-want-banner {
      margin: 0 20px 12px;
      background: linear-gradient(135deg, #FFE9EE 0%, #FFE4D6 100%);
      border-radius: var(--radius); padding: 14px 16px;
      border: 1.5px dashed #FF4D6D;
    }
    .both-want-title { font-size: 13px; font-weight: 700; color: #FF4D6D; margin-bottom: 8px; }
    .both-want-list { display: flex; flex-wrap: wrap; gap: 6px; }
    .both-want-chip {
      background: white; border-radius: 14px; padding: 4px 10px;
      font-size: 12px; color: var(--text); font-weight: 500;
      cursor: pointer; border: 1px solid rgba(255,77,109,0.2);
    }

    .history-item {
      margin: 0 20px 12px; background: white;
      border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden;
    }
    .history-header {
      padding: 14px 16px; display: flex;
      align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }
    .history-date { font-size: 14px; font-weight: 700; }
    .history-count { font-size: 12px; color: var(--text-3); }
    .history-dishes { padding: 12px 16px; display: flex; flex-wrap: wrap; gap: 8px; }
    .dish-tag { background: var(--bg); border-radius: 20px; padding: 4px 12px; font-size: 13px; color: var(--text-2); }
    .history-rating { padding: 8px 16px 12px; display: flex; align-items: center; gap: 8px; border-top: 1px solid var(--border); }
    .star-btn { background: none; border: none; cursor: pointer; font-size: 22px; padding: 2px; transition: transform 0.15s; filter: grayscale(1); opacity: 0.4; }
    .star-btn.filled { filter: none; opacity: 1; }
    .star-btn:active { transform: scale(1.2); }
    .history-rating-label { font-size: 12px; color: var(--text-3); margin-left: 4px; }

    .kitchen-avatar {
      width: 72px; height: 72px; border-radius: 50%;
      background: var(--primary-soft); font-size: 32px;
      display: flex; align-items: center; justify-content: center;
    }
    .kitchen-card {
      margin: 0 20px 16px; background: white;
      border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden;
    }
    .kitchen-row {
      display: flex; align-items: center; padding: 14px 16px;
      border-bottom: 1px solid var(--border); gap: 12px; cursor: pointer;
    }
    .kitchen-row:last-child { border-bottom: none; }
    .kitchen-row-icon { font-size: 20px; width: 32px; text-align: center; }
    .kitchen-row-text { flex: 1; font-size: 15px; font-weight: 500; }
    .kitchen-row-arrow { color: var(--text-3); font-size: 16px; }
    .kitchen-row-badge {
      background: var(--primary-soft); color: var(--primary);
      border-radius: 10px; font-size: 11px; font-weight: 600; padding: 2px 8px;
    }

    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; display: flex; align-items: flex-end; }
    .modal-sheet {
      width: 100%; max-width: 430px; margin: 0 auto;
      background: white; border-radius: 24px 24px 0 0;
      padding: 20px 20px calc(20px + var(--safe-bottom));
      max-height: 85vh; overflow-y: auto;
    }
    .modal-sheet::-webkit-scrollbar { display: none; }
    .modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 20px; }
    .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; }
    .input-group { margin-bottom: 16px; }
    .input-label { font-size: 13px; color: var(--text-2); margin-bottom: 6px; }
    .input-field { width: 100%; background: var(--bg); border: none; border-radius: var(--radius-sm); padding: 12px 16px; font-size: 15px; color: var(--text); outline: none; }
    .input-field:focus { box-shadow: 0 0 0 2px var(--primary-soft); }
    .cat-select-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; }
    .cat-option { border: 1.5px solid var(--border); border-radius: var(--radius-sm); padding: 10px 4px; text-align: center; cursor: pointer; font-size: 12px; font-weight: 500; transition: all 0.2s; }
    .cat-option.selected { border-color: var(--primary); background: var(--primary-light); color: var(--primary); }

    .spicy-row { display: flex; gap: 6px; flex-wrap: wrap; }
    .spicy-opt { flex: 1; min-width: 60px; padding: 8px; text-align: center; border-radius: var(--radius-sm); border: 1.5px solid var(--border); cursor: pointer; font-size: 12px; font-weight: 500; }
    .spicy-opt.selected { border-color: var(--primary); background: var(--primary-light); color: var(--primary); }

    .tag-pick-row { display: flex; gap: 6px; flex-wrap: wrap; }
    .tag-pick { padding: 6px 12px; border-radius: 16px; border: 1.5px solid var(--border); cursor: pointer; font-size: 12px; font-weight: 500; color: var(--text-2); background: white; }
    .tag-pick.selected { border-color: var(--primary); background: var(--primary-light); color: var(--primary); }

    .onboard { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 32px; }
    .onboard-logo { font-size: 72px; margin-bottom: 24px; }
    .onboard-title { font-size: 26px; font-weight: 800; margin-bottom: 8px; text-align: center; }
    .onboard-sub { font-size: 15px; color: var(--text-2); text-align: center; margin-bottom: 40px; }
    .onboard-btns { width: 100%; display: flex; flex-direction: column; gap: 12px; }

    .tag-admin { background: var(--primary-light); color: var(--primary); border-radius: 10px; font-size: 11px; font-weight: 600; padding: 2px 8px; }
    .tag-member { background: var(--green-light); color: var(--green); border-radius: 10px; font-size: 11px; font-weight: 600; padding: 2px 8px; }

    .toast {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.75); color: white;
      padding: 10px 24px; border-radius: 24px;
      font-size: 14px; z-index: 500;
      animation: toastIn 0.2s ease, toastOut 0.3s ease 1.8s forwards;
      white-space: nowrap; max-width: 90vw; overflow: hidden; text-overflow: ellipsis;
    }
    @keyframes toastIn { from { opacity:0; transform: translateX(-50%) translateY(-10px); } to { opacity:1; transform: translateX(-50%) translateY(0); } }
    @keyframes toastOut { to { opacity:0; transform: translateX(-50%) translateY(-10px); } }

    .invite-code-box { background: var(--primary-light); border-radius: var(--radius-sm); padding: 16px; text-align: center; margin-bottom: 16px; }
    .invite-code { font-size: 28px; font-weight: 800; color: var(--primary); letter-spacing: 4px; }
    .invite-hint { font-size: 12px; color: var(--text-3); margin-top: 4px; }

    .member-row { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); }
    .member-row:last-child { border-bottom: none; }
    .member-avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--primary-soft); font-size: 20px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .member-row.selectable { cursor: pointer; padding: 12px 8px; border-radius: 10px; border-bottom: 1px solid var(--border); }
    .member-row.selectable.selected { background: var(--primary-light); }
    .member-name { flex: 1; font-size: 15px; font-weight: 500; }

    .saved-badge { display: inline-flex; align-items: center; gap: 4px; background: var(--green-light); color: var(--green); border-radius: 20px; padding: 4px 12px; font-size: 12px; font-weight: 600; }

    .img-upload-box {
      width: 100%; aspect-ratio: 1; border: 2px dashed var(--border); border-radius: var(--radius);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 8px; cursor: pointer; background: var(--bg); transition: all 0.2s; overflow: hidden; position: relative;
    }
    .img-upload-box:active { background: var(--primary-light); border-color: var(--primary); }
    .img-upload-box.has-img { border-style: solid; border-color: var(--border); }
    .img-upload-box img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .img-upload-icon { font-size: 32px; }
    .img-upload-hint { font-size: 13px; color: var(--text-3); }
    .img-upload-change { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.45); color: white; font-size: 12px; text-align: center; padding: 6px; }
    .file-input-hidden { display: none; }

    .avatar-picker-wrap { display: flex; flex-direction: column; align-items: center; gap: 12px; margin-bottom: 20px; }
    .avatar-large { width: 88px; height: 88px; border-radius: 50%; background: var(--primary-soft); font-size: 42px; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; cursor: pointer; border: 3px solid var(--primary-soft); }
    .avatar-large img { width: 100%; height: 100%; object-fit: cover; }
    .avatar-large-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.35); display: flex; align-items: center; justify-content: center; color: white; font-size: 20px; }
    .avatar-tab-row { display: flex; gap: 0; border: 1.5px solid var(--border); border-radius: 20px; overflow: hidden; width: 100%; }
    .avatar-tab { flex: 1; padding: 8px; text-align: center; font-size: 13px; font-weight: 500; cursor: pointer; color: var(--text-2); background: white; }
    .avatar-tab.active { background: var(--primary); color: white; }
    .emoji-grid { display: grid; grid-template-columns: repeat(6,1fr); gap: 6px; width: 100%; }
    .emoji-opt { aspect-ratio: 1; border-radius: 10px; font-size: 24px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 2px solid transparent; transition: all 0.15s; }
    .emoji-opt.selected { border-color: var(--primary); background: var(--primary-light); }
    .emoji-opt:active { transform: scale(0.88); }

    .shop-item { display: flex; align-items: center; gap: 12px; padding: 10px 4px; border-bottom: 1px solid var(--border); cursor: pointer; }
    .shop-item:last-child { border-bottom: none; }
    .shop-check { width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--border); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 12px; color: white; }

const FbContext = createContext(null);

function FirebaseProvider({ children }) {
  const [fb, setFb] = useState(null);
  const [user, setUser] = useState(null); // {uid}
  const [authReady, setAuthReady] = useState(false);

  useEffect(() => {
    let unsub = null;
    waitForFirebase().then(api => {
      setFb(api);
      // 监听登录状态
      unsub = api.onAuthStateChanged(api.auth, async (u) => {
        if (u) {
          setUser({ uid: u.uid });
          setAuthReady(true);
        } else {
          // 没登录 → 匿名登录
          try {
            await api.signInAnonymously(api.auth);
          } catch (e) {
            console.error('Auth failed', e);
            setAuthReady(true);
          }
        }
      });
    });
    return () => { if (unsub) unsub(); };
  }, []);

  return <FbContext.Provider value={{ fb, user, authReady }}>{children}</FbContext.Provider>;
}

function useFb() { return useContext(FbContext); }

function OnboardPage({ onJoined, showToast }) {
  const { fb, user } = useFb();

  const [isAdmin, setIsAdmin] = useState(true);
  const [pendingKitchen, setPendingKitchen] = useState(null);
  const [loading, setLoading] = useState(false);

  const handleCreate = async () => {
    if (!kitchenName.trim()) return;
    if (!user) { showToast('正在登录中，请稍候...'); return; }
    setLoading(true);
    try {
      const inviteCode = Math.random().toString(36).slice(2,8).toUpperCase();
      const kRef = await fb.addDoc(fb.collection(fb.db, 'kitchens'), {
        name: kitchenName.trim(),
        inviteCode,
        createdBy: user.uid,
        createdAt: fb.serverTimestamp(),
      });
      setPendingKitchen({ id: kRef.id, name: kitchenName.trim(), inviteCode });
      setIsAdmin(true);
      setStep('name');
    } catch (e) {
      console.error(e);
      showToast('创建失败：' + (e.message || '请检查网络'));
    }
    setLoading(false);
  };

  const handleJoin = async () => {
    if (!user) { showToast('正在登录中，请稍候...'); return; }
    if (!inviteInput.trim()) { showToast('请输入邀请码'); return; }
    setLoading(true);
    try {
      const q = fb.query(fb.collection(fb.db, 'kitchens'), fb.where('inviteCode', '==', inviteInput.trim().toUpperCase()));
      const snap = await fb.getDocs(q);
      if (snap.empty) {
        showToast('邀请码不存在，请确认是否输入正确');
        setLoading(false);
        return;
      }
      const kd = snap.docs[0];
      const data = kd.data();
      setPendingKitchen({ id: kd.id, name: data.name, inviteCode: data.inviteCode });
      setIsAdmin(false);
      setStep('name');
    } catch (e) {
      console.error(e);
      showToast('查询失败：' + (e.message || '请检查网络'));
    }
    setLoading(false);
  };

  const handleFinish = async () => {
    if (!myName.trim()) return;
    if (!user || !pendingKitchen) { showToast('系统错误，请重试'); return; }
    setLoading(true);
    try {
      // 把自己写入 kitchens/{id}/members/{uid}

        fb.doc(fb.db, 'kitchens', pendingKitchen.id, 'members', user.uid),

          role: isAdmin ? 'admin' : 'member',
          emoji: isAdmin ? '👨‍🍳' : '😊',

          const ref = fb.doc(fb.db, 'kitchens', pendingKitchen.id, 'dishes', d.id);
          batch.set(ref, d);

          date: todayStr(), menu: [], chef: null, shopChecked: {}

        await batch.commit();
      }
      // 记录用户当前所在厨房
      await fb.setDoc(fb.doc(fb.db, 'users', user.uid), { currentKitchenId: pendingKitchen.id }, { merge: true });
      localPref.set('fam_kitchen_id', pendingKitchen.id);
      onJoined(pendingKitchen.id);
    } catch (e) {
      console.error(e);
      showToast('加入失败：' + (e.message || '请重试'));
    }
    setLoading(false);
  };

  if (step === 'welcome') return (
    <div className="onboard">

      <div className="onboard-title">家厨点菜</div>

      <div className="onboard-btns">
        <button className="btn-primary" onClick={() => setStep('create')}>创建我家厨房</button>
        <button className="btn-outline" style={{width:'100%',padding:'12px 28px',borderRadius:24,fontSize:15,fontWeight:600}} onClick={() => setStep('join')}>输入邀请码加入</button>
      </div>
    </div>
  );

  if (step === 'create') return (
    <div className="onboard" style={{justifyContent:'flex-start',paddingTop:80}}>
      <div style={{fontSize:48,marginBottom:16}}>🍳</div>
      <div className="onboard-title" style={{fontSize:22}}>给厨房起个名字</div>
      <div className="onboard-sub">比如：我们的小家、温馨小厨</div>
      <div style={{width:'100%',marginBottom:24}}>
        <input className="input-field" style={{width:'100%',textAlign:'center',fontSize:18,fontWeight:600}} placeholder="我家厨房" value={kitchenName} onChange={e=>setKitchenName(e.target.value)} />

      <div className="onboard-btns">
        <button className="btn-primary" onClick={handleCreate} disabled={loading}>{loading ? '创建中...' : '下一步'}</button>
        <button className="btn-outline" style={{width:'100%',padding:'12px',borderRadius:24,fontSize:14}} onClick={() => setStep('welcome')}>返回</button>
      </div>

  );

  if (step === 'join') return (
    <div className="onboard" style={{justifyContent:'flex-start',paddingTop:80}}>
      <div style={{fontSize:48,marginBottom:16}}>🔑</div>
      <div className="onboard-title" style={{fontSize:22}}>输入邀请码</div>
      <div className="onboard-sub">让家人把邀请码发给你</div>

        <button className="btn-primary" onClick={handleFinish} disabled={loading}>{loading ? '加入中...' : '进入厨房 🎉'}</button>
      </div>

// ===== 数据 hook：订阅厨房所有相关数据 =====
function useKitchenData(kitchenId) {
  const { fb, user } = useFb();
  const [kitchen, setKitchen] = useState(null);
  const [members, setMembers] = useState([]);
  const [dishes, setDishes] = useState([]);
  const [todayState, setTodayState] = useState({ date: todayStr(), menu: [], chef: null, shopChecked: {} });
  const [history, setHistory] = useState([]);
  const [votes, setVotes] = useState({}); // {dishId: {up:[uid], down:[uid]}}
  const [loaded, setLoaded] = useState({ kitchen:false, members:false, dishes:false, today:false, history:false, votes:false });

  useEffect(() => {
    if (!fb || !kitchenId) return;
    const unsubs = [];

    // kitchen
    unsubs.push(fb.onSnapshot(fb.doc(fb.db, 'kitchens', kitchenId), s => {
      setKitchen(s.exists() ? { id: s.id, ...s.data() } : null);
      setLoaded(p => ({ ...p, kitchen: true }));
    }));
    // members
    unsubs.push(fb.onSnapshot(fb.collection(fb.db, 'kitchens', kitchenId, 'members'), s => {
      const arr = s.docs.map(d => ({ id: d.id, ...d.data() }));
      setMembers(arr);
      setLoaded(p => ({ ...p, members: true }));
    }));
    // dishes
    unsubs.push(fb.onSnapshot(fb.collection(fb.db, 'kitchens', kitchenId, 'dishes'), s => {
      const arr = s.docs.map(d => ({ id: d.id, ...d.data() }));
      setDishes(arr);
      setLoaded(p => ({ ...p, dishes: true }));
    }));
    // today/state
    unsubs.push(fb.onSnapshot(fb.doc(fb.db, 'kitchens', kitchenId, 'today', 'state'), s => {
      if (s.exists()) {
        const data = s.data();
        // 自动跨日：如果存储的 date 不是今天，自动清空菜单（但保留 chef 给今天）
        if (data.date !== todayStr()) {
          setTodayState({ date: todayStr(), menu: [], chef: null, shopChecked: {} });
        } else {
          setTodayState({ date: data.date, menu: data.menu || [], chef: data.chef || null, shopChecked: data.shopChecked || {} });
        }
      } else {
        setTodayState({ date: todayStr(), menu: [], chef: null, shopChecked: {} });
      }
      setLoaded(p => ({ ...p, today: true }));
    }));
    // history
    unsubs.push(fb.onSnapshot(fb.collection(fb.db, 'kitchens', kitchenId, 'history'), s => {
      const arr = s.docs.map(d => ({ ...d.data() })).sort((a,b) => (b.date||'').localeCompare(a.date||''));
      setHistory(arr);
      setLoaded(p => ({ ...p, history: true }));
    }));
    // votes
    unsubs.push(fb.onSnapshot(fb.collection(fb.db, 'kitchens', kitchenId, 'votes'), s => {
      const obj = {};
      s.docs.forEach(d => { obj[d.id] = d.data(); });
      setVotes(obj);
      setLoaded(p => ({ ...p, votes: true }));
    }));

    return () => { unsubs.forEach(u => u && u()); };
  }, [fb, kitchenId]);

  const me = useMemo(() => members.find(m => m.id === user?.uid) || null, [members, user]);
  const allLoaded = Object.values(loaded).every(Boolean);

  return { kitchen, members, dishes, todayState, history, votes, me, allLoaded };
}

// ===== 今日页 =====
function TodayPage({ data, kitchenId, showToast, goPage }) {
  const { fb, user } = useFb();
  const { kitchen, members, dishes, todayState, history, votes, me } = data;
  const [showShopModal, setShowShopModal] = useState(false);
  const [showChefModal, setShowChefModal] = useState(false);

  const removeItem = async (id) => {
    const updated = (todayState.menu || []).filter(d => d.id !== id);
    await fb.setDoc(fb.doc(fb.db, 'kitchens', kitchenId, 'today', 'state'), {
      date: todayStr(), menu: updated, chef: todayState.chef || null, shopChecked: todayState.shopChecked || {}
    });
    showToast('已移除');
  };

  const todaySaved = history.find(h => h.date === todayStr());

  const saveMenu = async () => {
    if ((todayState.menu || []).length === 0) { showToast('请先点几个菜~'); return; }
    try {
      const docRef = fb.doc(fb.db, 'kitchens', kitchenId, 'history', todayStr());
      const existing = history.find(h => h.date === todayStr());
      await fb.setDoc(docRef, {
        date: todayStr(),
        dishes: todayState.menu,
        savedBy: me?.name || '某人',
        savedByUid: user.uid,
        chef: todayState.chef || null,
        rating: existing?.rating || 0,
        savedAt: fb.serverTimestamp(),
      });
      showToast('今日菜单已保存 ✓');
    } catch (e) {
      console.error(e); showToast('保存失败：' + e.message);
    }
  };

  const setChef = async (memberId) => {
    await fb.setDoc(fb.doc(fb.db, 'kitchens', kitchenId, 'today', 'state'), {
      date: todayStr(), menu: todayState.menu || [], chef: memberId, shopChecked: todayState.shopChecked || {}
    });
    setShowChefModal(false);
    const m = members.find(mm => mm.id === memberId);
    showToast(memberId ? `今日厨师：${m?.name || '?'} 👨‍🍳` : '已清除');
  };

  // 自动食材汇总
  const shoppingList = useMemo(() => {
    const map = {};
    (todayState.menu || []).forEach(item => {
      const d = dishes.find(dd => dd.id === item.id);
      if (!d) return;
      (d.ingredients || []).forEach(ing => {
        if (!map[ing]) map[ing] = [];
        map[ing].push(d.name);
      });
    });
    return Object.entries(map).map(([name, from]) => ({ name, from }));
  }, [todayState.menu, dishes]);

  const toggleShopCheck = async (name) => {
    const updated = { ...(todayState.shopChecked || {}), [name]: !(todayState.shopChecked || {})[name] };
    await fb.setDoc(fb.doc(fb.db, 'kitchens', kitchenId, 'today', 'state'), {
      date: todayStr(), menu: todayState.menu || [], chef: todayState.chef || null, shopChecked: updated
    });
  };

  const chefMember = members.find(m => m.id === todayState.chef);

  // 双方都想吃推荐
  const bothWantList = useMemo(() => {
    const memberIds = members.map(m => m.id);
    if (memberIds.length < 2) return [];
    const result = [];
    dishes.forEach(d => {
      if (d.hidden) return;
      const v = votes[d.id];
      if (!v || !v.up) return;
      const uniqUp = [...new Set(v.up)].filter(uid => memberIds.includes(uid));
      if (uniqUp.length >= 2 && !(todayState.menu || []).some(t => t.id === d.id)) {
        result.push(d);
      }
    });
    return result.slice(0, 6);
  }, [dishes, members, votes, todayState.menu]);

  const quickAdd = async (d) => {
    const updated = [...(todayState.menu || []), { id: d.id, name: d.name, emoji: d.emoji, categoryId: d.categoryId }];
    await fb.setDoc(fb.doc(fb.db, 'kitchens', kitchenId, 'today', 'state'), {
      date: todayStr(), menu: updated, chef: todayState.chef || null, shopChecked: todayState.shopChecked || {}
    });
    showToast(`✓ 已加入 ${d.name}`);
  };

  const getDish = (id) => dishes.find(d => d.id === id) || {};

  return (
    <div className="page-scroll">
      <div className="today-hero">
        <div className="today-date"><span className="sync-dot" />{todayFull()}</div>
        <div className="today-title">{kitchen?.name || '家厨点菜'}</div>
        <div className="today-sub">今天吃什么，一起说了算 🥢</div>
        <div className="today-chef-row">
          <div>
            <div className="today-chef-label">👨‍🍳 今日厨师</div>
            <div className="today-chef-name">{chefMember ? chefMember.name : '还没定～'}</div>
          </div>
          <button className="today-chef-btn" onClick={() => setShowChefModal(true)}>{todayState.chef ? '换人' : '指定'}</button>
        </div>
      </div>

      {bothWantList.length > 0 && (
        <div className="both-want-banner">
          <div className="both-want-title">💕 两人都想吃，要不要安排一下？</div>
          <div className="both-want-list">
            {bothWantList.map(d => (
              <div key={d.id} className="both-want-chip" onClick={() => quickAdd(d)}>{d.emoji} {d.name} +</div>
            ))}
          </div>
        </div>
      )}

      <div className="section-header">
        <div>
          <div className="section-title">今日菜单</div>
          {todaySaved && <span className="saved-badge" style={{marginTop:4}}>✓ 已保存</span>}
        </div>
        <span style={{fontSize:13,color:'var(--text-3)'}}>共 {(todayState.menu||[]).length} 道菜</span>
      </div>

      {(todayState.menu || []).length === 0 ? (
        <div className="empty-state">
          <div className="emoji">🍽️</div>
          <p>今天还没选菜</p>
          <p style={{fontSize:13,marginTop:4}}>去「点菜」页面选几个菜吧</p>
        </div>
      ) : (
        <div className="menu-list">
          {todayState.menu.map(item => {
            const d = getDish(item.id);
            const cat = CATEGORIES.find(c => c.id === (d.categoryId || item.categoryId));
            return (
              <div key={item.id} className="menu-item">
                <span style={{fontSize:28}}>{d.emoji || item.emoji}</span>
                <div style={{flex:1}}>
                  <div className="menu-item-name">
                    {d.name || item.name}
                    {d.spicy > 0 && <span style={{marginLeft:6}}><SpicyTag level={d.spicy} /></span>}
                  </div>
                  <div className="menu-item-cat">{cat?.icon} {cat?.name}</div>
                </div>
                <button className="remove-btn" onClick={() => removeItem(item.id)}>×</button>
              </div>
            );
          })}
        </div>
      )}

      {(todayState.menu || []).length > 0 && (
        <div style={{padding:'16px 20px 0',display:'flex',gap:10}}>
          <button className="btn-outline" style={{flex:1,padding:'12px'}} onClick={() => setShowShopModal(true)}>🛒 购物清单 ({shoppingList.length})</button>
          {!todaySaved ? (
            <button className="btn-primary" style={{flex:1}} onClick={saveMenu}>📌 保存菜单</button>
          ) : (
            <button className="btn-primary" style={{flex:1, background:'var(--green)'}} onClick={saveMenu}>🔄 重新保存</button>
          )}
        </div>
      )}

      {history.length > 0 && (
        <>
          <div className="section-header" style={{marginTop:8}}>
            <div className="section-title">最近食记</div>
            <span className="section-action" onClick={() => goPage && goPage('history')}>全部 ›</span>
          </div>
          {history.slice(0,2).map(h => (
            <div key={h.date} className="history-item">
              <div className="history-header">
                <div className="history-date">📅 {h.date}</div>
                <div className="history-count">{h.dishes.length} 道菜</div>
              </div>
              <div className="history-dishes">
                {h.dishes.map(d => <span key={d.id} className="dish-tag">{d.emoji} {d.name}</span>)}
              </div>
            </div>
          ))}
        </>
      )}

      {showChefModal && (
        <div className="modal-overlay" onClick={() => setShowChefModal(false)}>
          <div className="modal-sheet" onClick={e => e.stopPropagation()}>
            <div className="modal-handle" />
            <div className="modal-title">今天谁做饭？</div>
            {members.length === 0 ? (
              <div style={{color:'var(--text-3)',padding:'20px 0',textAlign:'center'}}>还没有家庭成员</div>
            ) : (
              members.map(m => (
                <div key={m.id} className={`member-row selectable ${todayState.chef===m.id?'selected':''}`} onClick={() => setChef(m.id)}>
                  <div className="member-avatar">
                    {m.avatarImg ? <img src={m.avatarImg} style={{width:'100%',height:'100%',objectFit:'cover'}} /> : m.emoji}
                  </div>
                  <div className="member-name">{m.name}</div>
                  {todayState.chef === m.id && <span style={{color:'var(--primary)',fontSize:18}}>✓</span>}
                </div>
              ))
            )}
            {todayState.chef && (
              <button className="btn-outline" style={{width:'100%',marginTop:16,padding:12,borderRadius:24}} onClick={() => setChef(null)}>清除今日厨师</button>
            )}
          </div>
        </div>
      )}

      {showShopModal && (
        <div className="modal-overlay" onClick={() => setShowShopModal(false)}>
          <div className="modal-sheet" onClick={e => e.stopPropagation()}>
            <div className="modal-handle" />
            <div className="modal-title">🛒 今日购物清单</div>
            <div style={{fontSize:13,color:'var(--text-3)',marginBottom:12}}>根据 {(todayState.menu||[]).length} 道菜自动汇总，共 {shoppingList.length} 项</div>
            {shoppingList.length === 0 ? (
              <div style={{color:'var(--text-3)',padding:'40px 0',textAlign:'center'}}>没有食材信息</div>
            ) : (
              <div style={{maxHeight:'55vh',overflowY:'auto'}}>
                {shoppingList.map(item => (
                  <div key={item.name} className="shop-item" onClick={() => toggleShopCheck(item.name)}>
                    <div className={`shop-check ${todayState.shopChecked?.[item.name] ? 'checked' : ''}`}>
                      {todayState.shopChecked?.[item.name] && '✓'}
                    </div>
                    <div style={{flex:1}}>
                      <div className={`shop-name ${todayState.shopChecked?.[item.name] ? 'checked' : ''}`}>{item.name}</div>
                      <div className="shop-from">来自：{item.from.slice(0,3).join('、')}{item.from.length>3?'等':''}</div>
                    </div>
                  </div>
                ))}
              </div>
            )}
            <button className="btn-outline" style={{width:'100%',marginTop:16,padding:12,borderRadius:24}} onClick={() => {
              const text = shoppingList.map(s => `□ ${s.name}`).join('\n');
              navigator.clipboard?.writeText(`今日购物清单（${todayStr()}）\n${text}`);
              showToast('✓ 清单已复制');
            }}>📋 复制清单</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ===== 点菜页 =====
function OrderPage({ data, kitchenId, showToast, goPage }) {
  const { fb, user } = useFb();
  const { dishes, todayState, votes, history, me } = data;
  const [search, setSearch] = useState('');
  const [activeCat, setActiveCat] = useState('all');
  const [activeTag, setActiveTag] = useState(null);
  const [shaking, setShaking] = useState(false);
  const [shakeResult, setShakeResult] = useState(null);

  // 近期吃过的菜（用于重复提醒）
  const recentMap = useMemo(() => {
    const map = {};
    history.slice(0, 14).forEach(h => {
      const days = daysBetween(h.date);
      (h.dishes || []).forEach(d => {
        if (!(d.id in map) || days < map[d.id]) map[d.id] = days;
      });
    });
    return map;
  }, [history]);

  const isInMenu = (id) => (todayState.menu || []).some(d => d.id === id);
  const myFavs = me?.favorites || [];
  const isFav = (id) => myFavs.includes(id);

  const getVote = (id) => {
    const v = votes[id] || { up: [], down: [] };
    return {
      iVotedUp: (v.up||[]).includes(user.uid),
      iVotedDown: (v.down||[]).includes(user.uid),
      upCount: [...new Set(v.up||[])].length,
      downCount: [...new Set(v.down||[])].length,
    };
  };

  const wantScore = (id) => {
    const v = votes[id];
    if (!v) return 0;
    const uniqUp = [...new Set(v.up || [])].length;
    const iVotedUp = (v.up || []).includes(user.uid);
    let score = 0;
    if (uniqUp >= 2) score += 100;
    if (iVotedUp) score += 50;
    score += uniqUp * 10;
    return score;
  };

  const filtered = dishes.filter(d => {
    if (d.hidden) return false;
    const catOk = activeCat === 'all' || d.categoryId === activeCat;
    const tagOk = !activeTag || (d.tags || []).includes(activeTag);
    const searchOk = !search || d.name.includes(search);
    return catOk && tagOk && searchOk;
  }).sort((a, b) => {
    const diff = wantScore(b.id) - wantScore(a.id);
    if (diff !== 0) return diff;
    return (a.id||'').localeCompare(b.id||'');
  });

  const toggleMenu = async (dish) => {
    let updated;
    if (isInMenu(dish.id)) {
      updated = (todayState.menu || []).filter(d => d.id !== dish.id);
      showToast('已从今日菜单移除');
    } else {
      updated = [...(todayState.menu || []), { id: dish.id, name: dish.name, emoji: dish.emoji, categoryId: dish.categoryId }];
      showToast('✓ 已加入今日菜单');
    }
    await fb.setDoc(fb.doc(fb.db, 'kitchens', kitchenId, 'today', 'state'), {
      date: todayStr(), menu: updated, chef: todayState.chef || null, shopChecked: todayState.shopChecked || {}
    });
  };

  const toggleFav = async (id) => {
    if (!me) return;
    const updated = isFav(id) ? myFavs.filter(f => f !== id) : [...myFavs, id];
    await fb.updateDoc(fb.doc(fb.db, 'kitchens', kitchenId, 'members', user.uid), { favorites: updated });
  };

  const handleVote = async (id, type) => {
    if (!user) return;
    const ref = fb.doc(fb.db, 'kitchens', kitchenId, 'votes', id);
    const v = votes[id] || { up: [], down: [] };
    let up = (v.up||[]).filter(u => u !== user.uid);
    let down = (v.down||[]).filter(u => u !== user.uid);
    if (type === 'up' && !(v.up||[]).includes(user.uid)) up.push(user.uid);
    if (type === 'down' && !(v.down||[]).includes(user.uid)) down.push(user.uid);
    await fb.setDoc(ref, { up, down }, { merge: true });
  };

  const shakeIt = () => {
    if (shaking) return;
    setShaking(true);
    setTimeout(() => {
      const pool = dishes.filter(d => !d.hidden);
      const pick = (catId, n=1) => {
        const list = pool.filter(d => d.categoryId === catId);
        const shuffled = [...list].sort(() => Math.random() - 0.5);
        return shuffled.slice(0, n);
      };
      const result = [
        ...pick('meat', 1),
        ...pick('veg', 1),
        ...pick('soup', 1),
        ...pick('staple', 1),
      ].filter(Boolean);
      if (Math.random() < 0.3) result.push(...pick('drink', 1));
      if (Math.random() < 0.2) result.push(...pick('dessert', 1));
      setShakeResult(result);
      setShaking(false);
    }, 700);
  };

  const acceptShake = async () => {
    if (!shakeResult) return;
    const newItems = shakeResult.filter(d => !isInMenu(d.id))
      .map(d => ({ id: d.id, name: d.name, emoji: d.emoji, categoryId: d.categoryId }));
    const updated = [...(todayState.menu||[]), ...newItems];
    await fb.setDoc(fb.doc(fb.db, 'kitchens', kitchenId, 'today', 'state'), {
      date: todayStr(), menu: updated, chef: todayState.chef || null, shopChecked: todayState.shopChecked || {}
    });
    showToast(`✓ ${newItems.length} 道菜已加入菜单`);
    setShakeResult(null);
  };

  return (
    <div className="page-scroll">
      <div className="page-header">
        <div style={{display:'flex',alignItems:'flex-end',justifyContent:'space-between'}}>
          <div>
            <div className="page-title">点菜 🍳</div>
            <div className="page-subtitle">📅 {todayFull()}</div>
          </div>
          <button className={`shake-inline-btn ${shaking ? 'shaking' : ''}`} onClick={shakeIt}>
            <span style={{fontSize:18,display:'inline-block'}}>🎲</span>
            <span>{shaking ? '摇中...' : '摇一摇'}</span>
          </button>
        </div>
      </div>

      <div className="search-bar">
        <span style={{fontSize:18}}>🔍</span>
        <input placeholder="搜索菜品..." value={search} onChange={e => setSearch(e.target.value)} />
        {search && <span style={{cursor:'pointer',color:'var(--text-3)',fontSize:18}} onClick={() => setSearch('')}>×</span>}
      </div>

      <div className="tab-bar">
        {CATEGORIES.map(cat => (
          <div key={cat.id} className={`tab-chip ${activeCat === cat.id ? 'active' : ''}`} onClick={() => setActiveCat(cat.id)}>
            {cat.icon} {cat.name}
          </div>
        ))}
      </div>

      <div className="tab-bar" style={{paddingBottom: 8}}>
        <div className={`tab-chip ${!activeTag ? 'active' : ''}`} onClick={() => setActiveTag(null)} style={{fontSize:12,padding:'4px 12px'}}>不限口味</div>
        {TASTE_TAGS.map(t => (
          <div key={t} className={`tab-chip ${activeTag === t ? 'active' : ''}`} onClick={() => setActiveTag(activeTag === t ? null : t)} style={{fontSize:12,padding:'4px 12px'}}>#{t}</div>
        ))}
      </div>

      {shakeResult && (
        <div style={{padding:'0 20px 12px'}}>
          <div className="shake-result-card">
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
              <div style={{fontWeight:700,fontSize:14}}>🎲 今天就这桌？</div>
              <div style={{display:'flex',gap:8}}>
                <button className="btn-outline" style={{padding:'4px 12px',fontSize:12,borderRadius:14}} onClick={shakeIt}>再摇一次</button>
                <button className="btn-outline" style={{padding:'4px 12px',fontSize:12,borderRadius:14,color:'var(--text-3)',borderColor:'var(--text-3)'}} onClick={() => setShakeResult(null)}>取消</button>
              </div>
            </div>
            {shakeResult.map(d => (
              <div key={d.id} className="shake-dish">
                <div className="shake-dish-emoji">{d.emoji}</div>
                <div className="shake-dish-info">
                  <div className="shake-dish-name">{d.name} {d.spicy > 0 && <SpicyTag level={d.spicy} />}</div>
                  <div className="shake-dish-cat">{CATEGORIES.find(c => c.id === d.categoryId)?.name}</div>
                </div>
              </div>
            ))}
            <button className="btn-primary" style={{marginTop:12,padding:'10px'}} onClick={acceptShake}>👍 就这桌！全部加入菜单</button>
          </div>
        </div>
      )}

      <div style={{padding:'0 20px 10px',fontSize:13,color:'var(--text-3)'}}>共 {filtered.length} 道菜</div>

      {filtered.length === 0 ? (
        <div className="empty-state"><div className="emoji">🔍</div><p>没有找到菜品</p></div>
      ) : (
        <div className="dish-grid">
          {filtered.map(dish => {
            const inMenu = isInMenu(dish.id);
            const v = getVote(dish.id);
            const recentDays = recentMap[dish.id];
            const showRecent = recentDays !== undefined && recentDays <= 3;
            return (
              <div key={dish.id} className="dish-card">
                {inMenu && <div className="dish-badge">✓ 已选</div>}
                {showRecent && !inMenu && (
                  <div className="dish-recent-warn">{recentDays === 0 ? '今天吃过' : `${recentDays}天前吃过`}</div>
                )}
                <div className="dish-img">
                  {dish.image ? <img src={dish.image} alt={dish.name} /> : dish.emoji}
                  {v.upCount >= 2 ? (
                    <div className="dish-both-want">💕 两人都想吃</div>
                  ) : v.iVotedUp ? (
                    <div className="dish-i-want">👍 你想吃</div>
                  ) : v.upCount === 1 ? (
                    <div className="dish-i-want" style={{background:'rgba(24,144,255,0.92)'}}>👍 TA想吃</div>
                  ) : null}
                </div>
                <div className="dish-info">
                  <div className="dish-name">{dish.name}</div>
                  <div className="dish-meta">
                    <span className="dish-cat">{CATEGORIES.find(c=>c.id===dish.categoryId)?.icon} {CATEGORIES.find(c=>c.id===dish.categoryId)?.name}</span>
                    {dish.spicy > 0 && <SpicyTag level={dish.spicy} />}
                    {(dish.tags || []).slice(0,1).map(t => <span key={t} className="tag-mini">#{t}</span>)}
                  </div>
                  <div className="dish-actions">
                    <div className="dish-vote">
                      <span className={`vote-btn up ${v.iVotedUp ? 'active' : ''}`} onClick={(e) => { e.stopPropagation(); handleVote(dish.id, 'up'); }}>👍 {v.upCount || ''}</span>
                      <span className={`vote-btn down ${v.iVotedDown ? 'active' : ''}`} onClick={(e) => { e.stopPropagation(); handleVote(dish.id, 'down'); }}>👎 {v.downCount || ''}</span>
                    </div>
                    <button className={`btn-add ${inMenu ? 'added' : ''}`} onClick={() => toggleMenu(dish)}>{inMenu ? '✓' : '+'}</button>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {(todayState.menu || []).length > 0 && (
        <div className="float-bar">
          <div className="float-bar-left">
            <div className="float-count">{(todayState.menu || []).length}</div>
            <div className="float-label">已选 {(todayState.menu || []).length} 道菜</div>
          </div>
          <button className="float-btn" onClick={() => goPage && goPage('today')}>查看菜单</button>
        </div>
      )}
    </div>
  );
}

  const { fb } = useFb();
  const { history, members } = data;
  const [expanded, setExpanded] = useState(null);

  const setRating = async (date, rating) => {
    await fb.updateDoc(fb.doc(fb.db, 'kitchens', kitchenId, 'history', date), { rating });
    showToast(`✓ 评分 ${rating} 星`);
  };

  if (history.length === 0) return (
    <div className="page-scroll">
      <div className="page-header"><div className="page-title">食记 📖</div></div>
      <div className="empty-state" style={{paddingTop:80}}>
        <div className="emoji">📅</div>
        <p>还没有保存过菜单</p>
        <p style={{fontSize:13,marginTop:4}}>点菜后在「今日」页保存</p>
      </div>
    </div>
  );

  return (
    <div className="page-scroll">
      <div className="page-header">
        <div className="page-title">食记 📖</div>
        <div className="page-subtitle">共 {history.length} 天的记录</div>
      </div>
      <div style={{paddingTop:4}}>
        {history.map((h) => {
          const chefMember = members.find(m => m.id === h.chef);
          return (
            <div key={h.date} className="history-item">
              <div className="history-header" onClick={() => setExpanded(expanded === h.date ? null : h.date)}>
                <div>
                  <div className="history-date">📅 {h.date}</div>
                  <div style={{fontSize:12,color:'var(--text-3)',marginTop:2}}>
                    {chefMember && `👨‍🍳 ${chefMember.name} 主厨`}
                    {chefMember && h.savedBy && ' · '}
                    {h.savedBy && `${h.savedBy} 保存`}
                  </div>
                </div>
                <div style={{display:'flex',alignItems:'center',gap:8}}>
                  <div className="history-count">{h.dishes.length} 道菜</div>
                  <span style={{color:'var(--text-3)',fontSize:14,transform:expanded===h.date?'rotate(180deg)':'none',transition:'0.2s'}}>▼</span>
                </div>
              </div>
              {expanded === h.date && (
                <>
                  <div className="history-dishes">
                    {h.dishes.map(d => <span key={d.id} className="dish-tag">{d.emoji} {d.name}</span>)}

                  <div className="history-rating">

                    {[1,2,3,4,5].map(n => (
                      <button key={n} className={`star-btn ${(h.rating||0) >= n ? 'filled' : ''}`} onClick={() => setRating(h.date, n)}>⭐</button>
                    ))}
                    {h.rating > 0 && <span className="history-rating-label">{h.rating} / 5</span>}
                  </div>
                </>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ===== 图片压缩 =====
function compressImage(file, maxW = 600) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const scale = Math.min(1, maxW / Math.max(img.width, img.height));
        const w = Math.round(img.width * scale);
        const h = Math.round(img.height * scale);
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', 0.82));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

  const showToast = useCallback((msg) => {
    setToast(msg);
    clearTimeout(toastTimer.current);
    toastTimer.current = setTimeout(() => setToast(''), 2100);
  }, []);

        // 检查本地缓存的厨房 ID 是否仍是该用户的成员
        if (localId) {
          const memSnap = await fb.getDoc(fb.doc(fb.db, 'kitchens', localId, 'members', user.uid));
          if (memSnap.exists()) {
            setKitchenId(localId);
            setCheckingMembership(false);
            return;
          }
        }
        // 本地没有 → 查 users/{uid}
        const userDoc = await fb.getDoc(fb.doc(fb.db, 'users', user.uid));
        if (userDoc.exists() && userDoc.data().currentKitchenId) {
          const cid = userDoc.data().currentKitchenId;
          // 检查仍是成员
          const memSnap = await fb.getDoc(fb.doc(fb.db, 'kitchens', cid, 'members', user.uid));
          if (memSnap.exists()) {
            localPref.set('fam_kitchen_id', cid);
            setKitchenId(cid);
          } else {
            setKitchenId(null);
          }
        } else {
          setKitchenId(null);
        }
      } catch (e) {
        console.error(e);
        setKitchenId(null);
      }
      setCheckingMembership(false);
    })();
  }, [fb, user]);

  const goPage = useCallback((p) => setPage(p), []);

  if (!authReady || checkingMembership) {
    return (
      <div style={{display:'flex',flexDirection:'column',height:'100%',maxWidth:430,margin:'0 auto',background:'white'}}>
        <FullLoading text={authReady ? '正在加载厨房...' : '正在登录...'} />
      </div>
    );
  }

  if (!kitchenId) {
    return (
      <div style={{display:'flex',flexDirection:'column',height:'100%',maxWidth:430,margin:'0 auto',background:'white'}}>
        <Toast msg={toast} />
        <OnboardPage onJoined={(id) => setKitchenId(id)} showToast={showToast} />
      </div>
    );
  }

  return <MainApp kitchenId={kitchenId} page={page} setPage={setPage} goPage={goPage} showToast={showToast} toast={toast} onLeave={() => setKitchenId(null)} />;
}

function MainApp({ kitchenId, page, setPage, goPage, showToast, toast, onLeave }) {
  const data = useKitchenData(kitchenId);

  const NAV = [
    { id: 'today', icon: '🏠', label: '今日' },
    { id: 'order', icon: '🍽️', label: '点菜' },
    { id: 'history', icon: '📖', label: '食记' },
    { id: 'kitchen', icon: '👨‍🍳', label: '厨房' },
  ];

  if (!data.allLoaded) {
    return (
      <div style={{display:'flex',flexDirection:'column',height:'100%',maxWidth:430,margin:'0 auto',background:'white'}}>
        <Toast msg={toast} />
        <FullLoading text="正在同步厨房数据..." />
      </div>
    );
  }

  return (
    <>
      <Toast msg={toast} />
      {page === 'today' && <TodayPage data={data} kitchenId={kitchenId} showToast={showToast} goPage={goPage} />}
      {page === 'order' && <OrderPage data={data} kitchenId={kitchenId} showToast={showToast} goPage={goPage} />}
      {page === 'history' && <HistoryPage data={data} kitchenId={kitchenId} showToast={showToast} />}
      {page === 'kitchen' && <KitchenPage data={data} kitchenId={kitchenId} showToast={showToast} onLeave={onLeave} />}
      <div className="bottom-nav">
        {NAV.map(n => (
          <div key={n.id} className={`nav-item ${page === n.id ? 'active' : ''}`} onClick={() => setPage(n.id)}>
            <span className="nav-icon">{n.icon}</span>
            <span className="nav-label">{n.label}</span>
          </div>
        ))}
      </div>
    </>
  );
}

function App() {
  return (
    <FirebaseProvider>
      <AppInner />
    </FirebaseProvider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
