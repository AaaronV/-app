<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>家厨点菜</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    /* ===== 全局重置与变量 ===== */
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    :root {
      --primary: #FF6B35;
      --primary-light: #FFF0EB;
      --primary-soft: #FFE4D6;
      --green: #52C41A;
      --green-light: #F0FFF4;
      --pink: #FF4D6D;
      --pink-light: #FFE9EE;
      --blue: #1890FF;
      --blue-light: #E6F4FF;
      --gold: #FAAD14;
      --gold-light: #FFF7E6;
      --bg: #F7F8FA;
      --card: #FFFFFF;
      --text: #1A1A1A;
      --text-2: #666666;
      --text-3: #999999;
      --border: #F0F0F0;
      --radius: 16px;
      --radius-sm: 10px;
      --shadow: 0 2px 12px rgba(0,0,0,0.06);
      --shadow-card: 0 4px 20px rgba(0,0,0,0.08);
      --nav-h: 68px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      font-family: -apple-system, 'PingFang SC', 'Helvetica Neue', sans-serif;
      color: var(--text);
      font-size: 15px;
      line-height: 1.5;
      overflow: hidden;
    }

    #root { height: 100%; display: flex; flex-direction: column; max-width: 430px; margin: 0 auto; position: relative; background: var(--bg); }

    /* ===== 滚动容器 ===== */
    .page-scroll {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding-bottom: calc(var(--nav-h) + var(--safe-bottom) + 16px);
    }
    .page-scroll::-webkit-scrollbar { display: none; }

    /* ===== 底部导航 ===== */
    .bottom-nav {
      position: fixed;
      bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 430px;
      height: calc(var(--nav-h) + var(--safe-bottom));
      background: white;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: flex-start;
      padding-top: 8px;
      z-index: 100;
      box-shadow: 0 -2px 12px rgba(0,0,0,0.04);
    }
    .nav-item {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      gap: 3px; cursor: pointer; padding: 4px 0;
      transition: all 0.2s;
    }
    .nav-icon { font-size: 22px; line-height: 1; }
    .nav-label { font-size: 11px; color: var(--text-3); font-weight: 500; }
    .nav-item.active .nav-label { color: var(--primary); font-weight: 600; }
    .nav-item.active .nav-icon { transform: scale(1.1); }

    /* ===== 顶部标题栏 ===== */
    .page-header {
      padding: 16px 20px 12px;
      background: white;
      position: sticky; top: 0; z-index: 50;
    }
    .page-title { font-size: 20px; font-weight: 700; color: var(--text); }
    .page-subtitle { font-size: 13px; color: var(--text-3); margin-top: 2px; }

    /* ===== 通用卡片 ===== */
    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    /* ===== 按钮 ===== */
    .btn-primary {
      background: var(--primary);
      color: white; border: none; border-radius: 24px;
      font-size: 15px; font-weight: 600;
      padding: 12px 28px; cursor: pointer;
      transition: all 0.2s; width: 100%;
    }
    .btn-primary:active { opacity: 0.85; transform: scale(0.98); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-outline {
      background: transparent; color: var(--primary);
      border: 1.5px solid var(--primary); border-radius: 24px;
      font-size: 14px; font-weight: 500;
      padding: 8px 20px; cursor: pointer;
    }

    /* ===== 标签/Tab ===== */
    .tab-bar {
      display: flex; gap: 8px;
      padding: 0 20px 12px;
      overflow-x: auto; -webkit-overflow-scrolling: touch;
    }
    .tab-bar::-webkit-scrollbar { display: none; }
    .tab-chip {
      flex-shrink: 0; padding: 6px 16px;
      border-radius: 20px; font-size: 13px; font-weight: 500;
      cursor: pointer; transition: all 0.2s;
      background: white; color: var(--text-2);
      border: 1.5px solid var(--border);
    }
    .tab-chip.active {
      background: var(--primary); color: white;
      border-color: var(--primary);
    }

    /* ===== 搜索框 ===== */
    .search-bar {
      margin: 12px 20px;
      background: white; border-radius: 24px;
      display: flex; align-items: center;
      padding: 10px 16px; gap: 8px;
      box-shadow: var(--shadow);
    }
    .search-bar input {
      flex: 1; border: none; outline: none;
      font-size: 15px; color: var(--text);
      background: transparent;
    }
    .search-bar input::placeholder { color: var(--text-3); }

    /* ===== 菜品双列网格 ===== */
    .dish-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 12px; padding: 0 20px 12px;
    }
    .dish-card {
      background: white; border-radius: var(--radius);
      overflow: hidden; box-shadow: var(--shadow);
      transition: transform 0.15s;
      position: relative;
    }
    .dish-card:active { transform: scale(0.97); }
    .dish-img {
      width: 100%; aspect-ratio: 1;
      background: linear-gradient(135deg, #FFE4D6 0%, #FFF0EB 100%);
      font-size: 52px; display: flex; align-items: center; justify-content: center;
      overflow: hidden; position: relative;
    }
    .dish-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .dish-info { padding: 10px 12px 12px; }
    .dish-name { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 4px; display: flex; align-items: center; gap: 4px; flex-wrap: wrap;}
    .dish-meta { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; margin-bottom: 6px; min-height: 16px; }
    .dish-cat { font-size: 11px; color: var(--text-3); }
    .dish-actions { display: flex; align-items: center; justify-content: space-between; margin-top: 8px; gap: 4px; }
    .dish-vote { display: flex; gap: 4px; }
    .vote-btn {
      background: var(--bg); border: 1.5px solid transparent; border-radius: 14px;
      font-size: 11px; padding: 3px 7px; cursor: pointer;
      display: inline-flex; align-items: center; gap: 2px;
      transition: all 0.2s; color: var(--text-2);
    }
    .vote-btn.up.active { background: var(--green-light); color: var(--green); border-color: var(--green); font-weight: 600; }
    .vote-btn.down.active { background: var(--pink-light); color: var(--pink); border-color: var(--pink); font-weight: 600; }
    .vote-btn:active { transform: scale(0.92); }
    .btn-add {
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--primary); color: white;
      border: none; font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s; line-height: 1; flex-shrink: 0;
    }
    .btn-add.added { background: var(--green); }
    .btn-add:active { transform: scale(0.88); }
    .dish-badge {
      position: absolute; top: 8px; right: 8px;
      background: var(--primary); color: white;
      border-radius: 10px; font-size: 11px; font-weight: 700;
      padding: 2px 7px; z-index: 2;
    }
    .dish-recent-warn {
      position: absolute; top: 8px; left: 8px;
      background: rgba(255, 173, 20, 0.95); color: white;
      border-radius: 10px; font-size: 10px; font-weight: 600;
      padding: 2px 6px; z-index: 2;
    }
    .dish-both-want {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: linear-gradient(90deg, #FF4D6D, #FF6B35);
      color: white; font-size: 10px; font-weight: 600;
      text-align: center; padding: 3px 0; z-index: 2;
    }
    .dish-i-want {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: rgba(82, 196, 26, 0.92);
      color: white; font-size: 10px; font-weight: 600;
      text-align: center; padding: 3px 0; z-index: 2;
    }

    /* ===== 口味/辣度小标签 ===== */
    .tag-mini {
      font-size: 10px; padding: 1px 6px; border-radius: 6px;
      background: var(--bg); color: var(--text-2); font-weight: 500;
      display: inline-flex; align-items: center; gap: 2px; line-height: 1.4;
    }
    .tag-mini.spicy-1 { background: #FFF7E6; color: #FAAD14; }
    .tag-mini.spicy-2 { background: #FFF1E6; color: #FA8C16; }
    .tag-mini.spicy-3 { background: #FFE4D6; color: #FF6B35; }
    .tag-mini.spicy-4 { background: #FFE0E0; color: #FF4D4F; font-weight: 700; }

    /* ===== 悬浮菜单栏 ===== */
    .float-bar {
      position: fixed; bottom: calc(var(--nav-h) + var(--safe-bottom) + 12px);
      left: 50%; transform: translateX(-50%);
      width: calc(100% - 40px); max-width: 390px;
      background: var(--text); border-radius: 20px;
      padding: 14px 20px; display: flex;
      align-items: center; justify-content: space-between;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
      z-index: 90;
      animation: slideUp 0.25s ease;
    }
    @keyframes slideUp { from { transform: translateX(-50%) translateY(20px); opacity: 0; } to { transform: translateX(-50%) translateY(0); opacity: 1; } }
    .float-bar-left { display: flex; align-items: center; gap: 12px; }
    .float-count {
      background: var(--primary); color: white;
      border-radius: 50%; width: 26px; height: 26px;
      font-size: 13px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
    }
    .float-label { color: white; font-size: 14px; font-weight: 500; }
    .float-btn {
      background: var(--primary); color: white;
      border: none; border-radius: 20px;
      padding: 8px 20px; font-size: 14px; font-weight: 600;
      cursor: pointer;
    }

    /* ===== 摇一摇按钮（顶部内联按钮，显眼）===== */
    .shake-inline-btn {
      display: inline-flex; align-items: center; gap: 6px;
      background: linear-gradient(135deg, #FF6B35 0%, #FF4D6D 100%);
      color: white; border: none; cursor: pointer;
      padding: 8px 14px; border-radius: 20px;
      font-size: 13px; font-weight: 700;
      box-shadow: 0 4px 12px rgba(255, 107, 53, 0.35);
      transition: transform 0.15s;
    }
    .shake-inline-btn:active { transform: scale(0.92); }
    .shake-inline-btn.shaking span:first-child { animation: shake 0.35s ease infinite; display: inline-block; }

    /* ===== 摇一摇按钮（右下角悬浮，作为快捷入口）===== */
    .shake-btn {
      position: fixed; bottom: calc(var(--nav-h) + var(--safe-bottom) + 80px);
      right: 20px;
      width: 54px; height: 54px; border-radius: 50%;
      background: linear-gradient(135deg, #FF6B35 0%, #FF4D6D 100%);
      color: white; border: none; cursor: pointer;
      font-size: 26px;
      box-shadow: 0 6px 20px rgba(255, 107, 53, 0.4);
      display: flex; align-items: center; justify-content: center;
      z-index: 80;
      transition: transform 0.2s;
    }
    .shake-btn:active { transform: scale(0.9); }
    .shake-btn.shaking { animation: shake 0.5s ease infinite; }
    @keyframes shake {
      0%, 100% { transform: rotate(0deg); }
      25% { transform: rotate(-15deg); }
      75% { transform: rotate(15deg); }
    }

    /* ===== 今日页 ===== */
    .today-hero {
      margin: 16px 20px;
      background: linear-gradient(135deg, #FF6B35 0%, #FF8C5A 100%);
      border-radius: 20px; padding: 24px;
      color: white; position: relative; overflow: hidden;
    }
    .today-hero::after {
      content: '🍳'; position: absolute;
      right: 20px; bottom: 10px; font-size: 64px; opacity: 0.2;
    }
    .today-date { font-size: 13px; opacity: 0.85; margin-bottom: 4px; }
    .today-title { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
    .today-sub { font-size: 13px; opacity: 0.75; }
    .today-chef-row {
      margin-top: 14px; padding-top: 14px; border-top: 1px solid rgba(255,255,255,0.2);
      display: flex; align-items: center; justify-content: space-between;
      position: relative; z-index: 1;
    }
    .today-chef-label { font-size: 12px; opacity: 0.85; }
    .today-chef-name { font-size: 15px; font-weight: 700; margin-top: 2px; }
    .today-chef-btn {
      background: rgba(255,255,255,0.25); color: white;
      border: 1.5px solid rgba(255,255,255,0.4); border-radius: 16px;
      padding: 5px 12px; font-size: 12px; font-weight: 600; cursor: pointer;
    }

    .menu-list { padding: 0 20px; display: flex; flex-direction: column; gap: 10px; }
    .menu-item {
      background: white; border-radius: var(--radius-sm);
      padding: 14px 16px; display: flex; align-items: center;
      gap: 12px; box-shadow: var(--shadow);
    }
    .menu-item-emoji { font-size: 28px; }
    .menu-item-name { font-size: 15px; font-weight: 600; flex: 1; }
    .menu-item-cat { font-size: 12px; color: var(--text-3); }
    .remove-btn { background: none; border: none; font-size: 20px; color: var(--text-3); cursor: pointer; padding: 4px; }
    .empty-state {
      text-align: center; padding: 60px 20px;
      color: var(--text-3);
    }
    .empty-state .emoji { font-size: 56px; margin-bottom: 12px; }
    .empty-state p { font-size: 15px; }
    .section-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px 10px;
    }
    .section-title { font-size: 16px; font-weight: 700; }
    .section-action { font-size: 13px; color: var(--primary); cursor: pointer; }

    /* ===== 双方都想吃推荐区 ===== */
    .both-want-banner {
      margin: 0 20px 12px;
      background: linear-gradient(135deg, #FFE9EE 0%, #FFE4D6 100%);
      border-radius: var(--radius);
      padding: 14px 16px;
      border: 1.5px dashed #FF4D6D;
    }
    .both-want-title { font-size: 13px; font-weight: 700; color: #FF4D6D; margin-bottom: 8px; }
    .both-want-list { display: flex; flex-wrap: wrap; gap: 6px; }
    .both-want-chip {
      background: white; border-radius: 14px; padding: 4px 10px;
      font-size: 12px; color: var(--text); font-weight: 500;
      cursor: pointer; border: 1px solid rgba(255,77,109,0.2);
    }

    /* ===== 食记页 ===== */
    .history-item {
      margin: 0 20px 12px;
      background: white; border-radius: var(--radius);
      box-shadow: var(--shadow); overflow: hidden;
    }
    .history-header {
      padding: 14px 16px; display: flex;
      align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }
    .history-date { font-size: 14px; font-weight: 700; }
    .history-count { font-size: 12px; color: var(--text-3); }
    .history-dishes { padding: 12px 16px; display: flex; flex-wrap: wrap; gap: 8px; }
    .dish-tag {
      background: var(--bg); border-radius: 20px;
      padding: 4px 12px; font-size: 13px; color: var(--text-2);
    }
    .history-rating {
      padding: 8px 16px 12px;
      display: flex; align-items: center; gap: 8px;
      border-top: 1px solid var(--border);
    }
    .star-btn {
      background: none; border: none; cursor: pointer;
      font-size: 22px; padding: 2px; transition: transform 0.15s;
      filter: grayscale(1); opacity: 0.4;
    }
    .star-btn.filled { filter: none; opacity: 1; }
    .star-btn:active { transform: scale(1.2); }
    .history-rating-label { font-size: 12px; color: var(--text-3); margin-left: 4px; }

    /* ===== 厨房管理页 ===== */
    .kitchen-avatar {
      width: 72px; height: 72px; border-radius: 50%;
      background: var(--primary-soft); font-size: 32px;
      display: flex; align-items: center; justify-content: center;
    }
    .kitchen-card {
      margin: 0 20px 16px;
      background: white; border-radius: var(--radius);
      box-shadow: var(--shadow); overflow: hidden;
    }
    .kitchen-row {
      display: flex; align-items: center;
      padding: 14px 16px; border-bottom: 1px solid var(--border);
      gap: 12px; cursor: pointer;
    }
    .kitchen-row:last-child { border-bottom: none; }
    .kitchen-row-icon { font-size: 20px; width: 32px; text-align: center; }
    .kitchen-row-text { flex: 1; font-size: 15px; font-weight: 500; }
    .kitchen-row-arrow { color: var(--text-3); font-size: 16px; }
    .kitchen-row-badge {
      background: var(--primary-soft); color: var(--primary);
      border-radius: 10px; font-size: 11px; font-weight: 600;
      padding: 2px 8px;
    }

    /* ===== 模态框 ===== */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.4); z-index: 200;
      display: flex; align-items: flex-end;
    }
    .modal-sheet {
      width: 100%; max-width: 430px; margin: 0 auto;
      background: white; border-radius: 24px 24px 0 0;
      padding: 20px 20px calc(20px + var(--safe-bottom));
      max-height: 85vh; overflow-y: auto;
    }
    .modal-sheet::-webkit-scrollbar { display: none; }
    .modal-handle {
      width: 36px; height: 4px; background: var(--border);
      border-radius: 2px; margin: 0 auto 20px;
    }
    .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; }
    .input-group { margin-bottom: 16px; }
    .input-label { font-size: 13px; color: var(--text-2); margin-bottom: 6px; }
    .input-field {
      width: 100%; background: var(--bg); border: none;
      border-radius: var(--radius-sm); padding: 12px 16px;
      font-size: 15px; color: var(--text); outline: none;
    }
    .input-field:focus { box-shadow: 0 0 0 2px var(--primary-soft); }
    .cat-select-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; }
    .cat-option {
      border: 1.5px solid var(--border); border-radius: var(--radius-sm);
      padding: 10px 4px; text-align: center; cursor: pointer;
      font-size: 12px; font-weight: 500; transition: all 0.2s;
    }
    .cat-option.selected { border-color: var(--primary); background: var(--primary-light); color: var(--primary); }

    .spicy-row { display: flex; gap: 6px; flex-wrap: wrap; }
    .spicy-opt {
      flex: 1; min-width: 60px;
      padding: 8px; text-align: center; border-radius: var(--radius-sm);
      border: 1.5px solid var(--border); cursor: pointer;
      font-size: 12px; font-weight: 500;
    }
    .spicy-opt.selected { border-color: var(--primary); background: var(--primary-light); color: var(--primary); }

    .tag-pick-row { display: flex; gap: 6px; flex-wrap: wrap; }
    .tag-pick {
      padding: 6px 12px; border-radius: 16px;
      border: 1.5px solid var(--border); cursor: pointer;
      font-size: 12px; font-weight: 500; color: var(--text-2);
      background: white;
    }
    .tag-pick.selected { border-color: var(--primary); background: var(--primary-light); color: var(--primary); }

    /* ===== 欢迎/引导页 ===== */
    .onboard {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 40px 32px;
    }
    .onboard-logo { font-size: 72px; margin-bottom: 24px; }
    .onboard-title { font-size: 26px; font-weight: 800; margin-bottom: 8px; text-align: center; }
    .onboard-sub { font-size: 15px; color: var(--text-2); text-align: center; margin-bottom: 40px; }
    .onboard-btns { width: 100%; display: flex; flex-direction: column; gap: 12px; }

    /* ===== 标签 ===== */
    .tag-admin { background: var(--primary-light); color: var(--primary); border-radius: 10px; font-size: 11px; font-weight: 600; padding: 2px 8px; }
    .tag-member { background: var(--green-light); color: var(--green); border-radius: 10px; font-size: 11px; font-weight: 600; padding: 2px 8px; }

    /* ===== 吐司提示 ===== */
    .toast {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.75); color: white;
      padding: 10px 24px; border-radius: 24px;
      font-size: 14px; z-index: 500;
      animation: toastIn 0.2s ease, toastOut 0.3s ease 1.8s forwards;
      white-space: nowrap;
    }
    @keyframes toastIn { from { opacity:0; transform: translateX(-50%) translateY(-10px); } to { opacity:1; transform: translateX(-50%) translateY(0); } }
    @keyframes toastOut { to { opacity:0; transform: translateX(-50%) translateY(-10px); } }

    /* ===== 邀请码样式 ===== */
    .invite-code-box {
      background: var(--primary-light); border-radius: var(--radius-sm);
      padding: 16px; text-align: center; margin-bottom: 16px;
    }
    .invite-code { font-size: 28px; font-weight: 800; color: var(--primary); letter-spacing: 4px; }
    .invite-hint { font-size: 12px; color: var(--text-3); margin-top: 4px; }

    .member-row {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 0; border-bottom: 1px solid var(--border);
    }
    .member-row:last-child { border-bottom: none; }
    .member-avatar {
      width: 40px; height: 40px; border-radius: 50%;
      background: var(--primary-soft); font-size: 20px;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    .member-row.selectable { cursor: pointer; padding: 12px 8px; border-radius: 10px; border-bottom: 1px solid var(--border); }
    .member-row.selectable.selected { background: var(--primary-light); }
    .member-name { flex: 1; font-size: 15px; font-weight: 500; }

    .saved-badge {
      display: inline-flex; align-items: center; gap: 4px;

// ===== 数据存储工具 =====
const storage = {
  get: (key, def) => { try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : def; } catch { return def; } },
  set: (key, val) => { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} },
};

const todayStr = () => new Date().toLocaleDateString('zh-CN', { year:'numeric', month:'2-digit', day:'2-digit' }).replace(/\//g,'-');
const todayFull = () => new Date().toLocaleDateString('zh-CN', { year:'numeric', month:'long', day:'numeric', weekday:'long' });

// 计算两个日期字符串差几天（YYYY-MM-DD 格式）
const daysBetween = (dStr) => {
  try {
    const d = new Date(dStr.replace(/-/g,'/'));
    const now = new Date();
    const diff = Math.floor((now - d) / (1000*60*60*24));
    return diff;
  } catch { return 999; }
};

// 取得菜品近期被吃次数（用于摇一摇加权 + 重复提醒）
const recentDishMap = () => {
  const hist = storage.get('fam_history', []);
  const map = {}; // { dishId: 最近一次吃的天数差 }
  hist.slice(0, 14).forEach(h => {
    const days = daysBetween(h.date);
    (h.dishes || []).forEach(d => {
      if (!(d.id in map) || days < map[d.id]) map[d.id] = days;
    });
  });
  return map;
};

// ===== Toast 组件 =====
function Toast({ msg }) {
  return msg ? <div className="toast">{msg}</div> : null;
}

// ===== 欢迎/设置页 =====
function OnboardPage({ onDone }) {
  const [step, setStep] = useState('welcome');
  const [kitchenName, setKitchenName] = useState('');
  const [inviteInput, setInviteInput] = useState('');
  const [myName, setMyName] = useState('');
  const [isAdmin, setIsAdmin] = useState(true);
  const [pendingKitchen, setPendingKitchen] = useState(null);

  const handleCreate = () => {
    if (!kitchenName.trim()) return;
    const kitchen = { id: Date.now().toString(), name: kitchenName.trim(), inviteCode: Math.random().toString(36).slice(2,8).toUpperCase() };
    setPendingKitchen(kitchen);
    setIsAdmin(true);
    setStep('name');
  };

  const handleJoin = () => {
    const saved = storage.get('fam_kitchen', null);
    if (saved && saved.inviteCode === inviteInput.trim().toUpperCase()) {
      setPendingKitchen(saved);
      setIsAdmin(false);
      setStep('name');
    } else {
      alert('邀请码不正确，请重新输入');
    }
  };

  const handleFinish = () => {
    if (!myName.trim()) return;
    const userId = Date.now().toString();
    storage.set('fam_kitchen', pendingKitchen);
    storage.set('fam_user', { id: userId, name: myName.trim(), role: isAdmin ? 'admin' : 'member', emoji: isAdmin ? '👨‍🍳' : '😊' });
    const members = storage.get('fam_members', []);
    const me = { id: userId, name: myName.trim(), role: isAdmin ? 'admin' : 'member', emoji: isAdmin ? '👨‍🍳' : '😊' };
    storage.set('fam_members', [...members, me]);
    storage.set('fam_dishes', SAMPLE_DISHES);
    onDone();
  };

  if (step === 'welcome') return (
    <div className="onboard">
      <div className="onboard-logo">🏠</div>
      <div className="onboard-title">家厨点菜</div>
      <div className="onboard-sub">家人一起选菜，每天吃得开心</div>
      <div className="onboard-btns">
        <button className="btn-primary" onClick={() => setStep('create')}>创建我家厨房</button>
        <button className="btn-outline" style={{width:'100%',padding:'12px 28px',borderRadius:24,fontSize:15,fontWeight:600,cursor:'pointer'}} onClick={() => setStep('join')}>输入邀请码加入</button>
      </div>
    </div>
  );

  if (step === 'create') return (
    <div className="onboard" style={{justifyContent:'flex-start',paddingTop:80}}>
      <div style={{fontSize:48,marginBottom:16}}>🍳</div>
      <div className="onboard-title" style={{fontSize:22}}>给厨房起个名字</div>
      <div className="onboard-sub">比如：我们的小家、温馨小厨</div>
      <div style={{width:'100%',marginBottom:24}}>
        <input className="input-field" style={{width:'100%',textAlign:'center',fontSize:18,fontWeight:600}} placeholder="我家厨房" value={kitchenName} onChange={e=>setKitchenName(e.target.value)} />
      </div>
      <div className="onboard-btns">
        <button className="btn-primary" onClick={handleCreate}>下一步</button>
        <button className="btn-outline" style={{width:'100%',padding:'12px',borderRadius:24,fontSize:14,cursor:'pointer'}} onClick={() => setStep('welcome')}>返回</button>
      </div>
    </div>
  );

  if (step === 'join') return (
    <div className="onboard" style={{justifyContent:'flex-start',paddingTop:80}}>
      <div style={{fontSize:48,marginBottom:16}}>🔑</div>
      <div className="onboard-title" style={{fontSize:22}}>输入邀请码</div>
      <div className="onboard-sub">让家人把邀请码发给你</div>
      <div style={{width:'100%',marginBottom:24}}>
        <input className="input-field" style={{width:'100%',textAlign:'center',fontSize:24,fontWeight:800,letterSpacing:4}} placeholder="XXXXXX" value={inviteInput} onChange={e=>setInviteInput(e.target.value.toUpperCase())} maxLength={6} />
      </div>
      <div className="onboard-btns">
        <button className="btn-primary" onClick={handleJoin}>加入厨房</button>
        <button className="btn-outline" style={{width:'100%',padding:'12px',borderRadius:24,fontSize:14,cursor:'pointer'}} onClick={() => setStep('welcome')}>返回</button>
      </div>
    </div>
  );

  if (step === 'name') return (
    <div className="onboard" style={{justifyContent:'flex-start',paddingTop:80}}>

      <div className="onboard-title" style={{fontSize:22}}>你叫什么名字？</div>

// ===== 辣度小标签组件 =====
function SpicyTag({ level }) {
  if (!level) return null;
  return <span className={`tag-mini spicy-${level}`}>{'🌶'.repeat(level)}</span>;
}

// ===== 今日页 =====
function TodayPage({ showToast, goPage }) {
  const [todayMenu, setTodayMenu] = useState([]);
  const [saved, setSaved] = useState(false);
  const [todayChef, setTodayChef] = useState(null);
  const [history, setHistory] = useState([]);
  const [showShopModal, setShowShopModal] = useState(false);
  const [showChefModal, setShowChefModal] = useState(false);
  const [shopChecked, setShopChecked] = useState({});
  const user = storage.get('fam_user', {});
  const dishes = storage.get('fam_dishes', SAMPLE_DISHES);
  const members = storage.get('fam_members', []);

  // 重新加载今日数据
  const reload = () => {
    setTodayMenu(storage.get('fam_today_menu', []));
    const hist = storage.get('fam_history', []);
    setHistory(hist);
    const todaySaved = hist.find(h => h.date === todayStr());
    setSaved(!!todaySaved);
    const chefs = storage.get('fam_today_chef', {});
    setTodayChef(chefs[todayStr()] || null);
    setShopChecked(storage.get('fam_shop_checked', {})[todayStr()] || {});
  };
  useEffect(() => { reload(); }, []);

  const removeItem = (id) => {
    const updated = todayMenu.filter(d => d.id !== id);
    storage.set('fam_today_menu', updated);
    setTodayMenu(updated);
    showToast('已移除');
  };

  const saveMenu = () => {
    if (todayMenu.length === 0) { showToast('请先点几个菜~'); return; }
    const hist = storage.get('fam_history', []);
    const today = todayStr();
    const filtered = hist.filter(h => h.date !== today);
    const existing = hist.find(h => h.date === today) || {};
    storage.set('fam_history', [{
      date: today,
      dishes: todayMenu,
      savedBy: user.name,
      chef: todayChef,
      rating: existing.rating || 0,
    }, ...filtered]);
    setSaved(true);
    reload();
    showToast('今日菜单已保存 ✓');
  };

  const setChef = (memberId) => {
    const chefs = storage.get('fam_today_chef', {});
    chefs[todayStr()] = memberId;
    storage.set('fam_today_chef', chefs);
    setTodayChef(memberId);
    setShowChefModal(false);
    const m = members.find(mm => mm.id === memberId);
    showToast(`今日厨师：${m?.name || '未知'} 👨‍🍳`);
  };

  // 自动食材汇总（去重）
  const shoppingList = useMemo(() => {
    const map = {}; // ingredient -> [dishName,...]
    todayMenu.forEach(item => {
      const d = dishes.find(dd => dd.id === item.id);
      if (!d) return;
      (d.ingredients || []).forEach(ing => {
        if (!map[ing]) map[ing] = [];
        map[ing].push(d.name);
      });
    });
    return Object.entries(map).map(([name, from]) => ({ name, from }));
  }, [todayMenu, dishes]);

  const toggleShopCheck = (name) => {
    const updated = { ...shopChecked, [name]: !shopChecked[name] };
    setShopChecked(updated);
    const all = storage.get('fam_shop_checked', {});
    all[todayStr()] = updated;
    storage.set('fam_shop_checked', all);
  };

  const getDish = (id) => dishes.find(d => d.id === id) || {};
  const chefMember = members.find(m => m.id === todayChef);

  // 双方都想吃推荐（基于投票，未在今日菜单的）
  const bothWantList = useMemo(() => {
    const votes = storage.get('fam_votes', {}); // {dishId: {up:[uid,...], down:[uid,...]}}
    const memberIds = members.map(m => m.id);
    if (memberIds.length < 2) return [];
    const result = [];
    dishes.forEach(d => {
      if (d.hidden) return;
      const v = votes[d.id];
      if (!v || !v.up) return;
      // 至少2个不同的成员投了想吃
      const uniqUp = [...new Set(v.up)].filter(uid => memberIds.includes(uid));
      if (uniqUp.length >= 2 && !todayMenu.some(t => t.id === d.id)) {
        result.push(d);
      }
    });
    return result.slice(0, 6);
  }, [dishes, members, todayMenu]);

  const quickAdd = (d) => {
    const updated = [...todayMenu, { id: d.id, name: d.name, emoji: d.emoji, categoryId: d.categoryId }];
    storage.set('fam_today_menu', updated);
    setTodayMenu(updated);
    showToast(`✓ 已加入 ${d.name}`);
  };

  return (
    <div className="page-scroll">
      {/* 顶部横幅 */}
      <div className="today-hero">
        <div className="today-date">{todayFull()}</div>
        <div className="today-title">{storage.get('fam_kitchen',{}).name || '家厨点菜'}</div>
        <div className="today-sub">今天吃什么，一起说了算 🥢</div>
        {/* 今日厨师 */}
        <div className="today-chef-row">
          <div>
            <div className="today-chef-label">👨‍🍳 今日厨师</div>

// ===== 点菜页 =====
function OrderPage({ showToast, goPage }) {
  const [search, setSearch] = useState('');
  const [activeCat, setActiveCat] = useState('all');
  const [activeTag, setActiveTag] = useState(null); // 二级标签筛选
  const [todayMenu, setTodayMenu] = useState(storage.get('fam_today_menu', []));
  const [favorites, setFavorites] = useState(storage.get('fam_favorites', []));
  const [votes, setVotes] = useState(storage.get('fam_votes', {}));
  const [dishes, setDishes] = useState(storage.get('fam_dishes', SAMPLE_DISHES));
  const [shaking, setShaking] = useState(false);
  const [shakeResult, setShakeResult] = useState(null);
  const user = storage.get('fam_user', {});
  const recentMap = useMemo(() => recentDishMap(), [todayMenu]);

  useEffect(() => {
    setDishes(storage.get('fam_dishes', SAMPLE_DISHES));
    setTodayMenu(storage.get('fam_today_menu', []));
  }, []);

  // 计算菜品的"想吃"优先级分数（用于置顶排序）
  const wantScore = (id) => {
    const v = votes[id];
    if (!v) return 0;
    const uniqUp = [...new Set(v.up || [])].length;
    const iVotedUp = (v.up || []).includes(user.id);
    // 两人都想吃：100；我投了想吃：50；别人投了想吃：每人 10
    let score = 0;
    if (uniqUp >= 2) score += 100;
    if (iVotedUp) score += 50;
    score += uniqUp * 10;
    return score;
  };

  const filtered = dishes.filter(d => {
    if (d.hidden) return false;
    const catOk = activeCat === 'all' || d.categoryId === activeCat;
    const tagOk = !activeTag || (d.tags || []).includes(activeTag);
    const searchOk = !search || d.name.includes(search);
    return catOk && tagOk && searchOk;
  }).sort((a, b) => {
    // 优先级：投了想吃的置顶
    const diff = wantScore(b.id) - wantScore(a.id);
    if (diff !== 0) return diff;
    // 同分时按原 id 顺序保持稳定
    return a.id - b.id;
  });

  const isInMenu = (id) => todayMenu.some(d => d.id === id);
  const isFav = (id) => favorites.includes(id);
  const getVote = (id) => {
    const v = votes[id] || { up: [], down: [] };
    return {
      iVotedUp: v.up.includes(user.id),
      iVotedDown: v.down.includes(user.id),
      upCount: [...new Set(v.up)].length,
      downCount: [...new Set(v.down)].length,
    };
  };

  const toggleMenu = (dish) => {
    let updated;
    if (isInMenu(dish.id)) {
      updated = todayMenu.filter(d => d.id !== dish.id);
      showToast('已从今日菜单移除');
    } else {
      updated = [...todayMenu, { id: dish.id, name: dish.name, emoji: dish.emoji, categoryId: dish.categoryId }];
      showToast('✓ 已加入今日菜单');
    }
    storage.set('fam_today_menu', updated);
    setTodayMenu(updated);
  };

  const toggleFav = (id) => {
    const updated = isFav(id) ? favorites.filter(f => f !== id) : [...favorites, id];
    storage.set('fam_favorites', updated);
    setFavorites(updated);
  };

  const handleVote = (id, type) => {
    if (!user.id) { showToast('请先完成个人信息'); return; }
    const v = votes[id] || { up: [], down: [] };
    let up = v.up.filter(u => u !== user.id);
    let down = v.down.filter(u => u !== user.id);
    if (type === 'up' && !v.up.includes(user.id)) up.push(user.id);
    if (type === 'down' && !v.down.includes(user.id)) down.push(user.id);
    const updated = { ...votes, [id]: { up, down } };
    setVotes(updated);
    storage.set('fam_votes', updated);
  };

  // 摇一摇随机选菜
  const shakeIt = () => {
    if (shaking) return;
    setShaking(true);
    setTimeout(() => {
      const pool = dishes.filter(d => !d.hidden);
      const pick = (catId, n=1) => {
        const list = pool.filter(d => d.categoryId === catId);
        const shuffled = [...list].sort(() => Math.random() - 0.5);
        return shuffled.slice(0, n);
      };
      // 1荤1素1汤1主食，可能附加饮料/甜品
      const result = [
        ...pick('meat', 1),
        ...pick('veg', 1),
        ...pick('soup', 1),
        ...pick('staple', 1),
      ].filter(Boolean);
      // 30% 概率加饮料，20% 加甜品
      if (Math.random() < 0.3) result.push(...pick('drink', 1));
      if (Math.random() < 0.2) result.push(...pick('dessert', 1));
      setShakeResult(result);
      setShaking(false);
    }, 700);
  };

  const acceptShake = () => {
    if (!shakeResult) return;
    const newItems = shakeResult.filter(d => !isInMenu(d.id))
      .map(d => ({ id: d.id, name: d.name, emoji: d.emoji, categoryId: d.categoryId }));
    const updated = [...todayMenu, ...newItems];
    storage.set('fam_today_menu', updated);
    setTodayMenu(updated);
    showToast(`✓ ${newItems.length} 道菜已加入菜单`);
    setShakeResult(null);
  };

  return (
    <div className="page-scroll">
      {/* 标题 */}
      <div className="page-header">
        <div style={{display:'flex',alignItems:'flex-end',justifyContent:'space-between'}}>
          <div>
            <div className="page-title">点菜 🍳</div>
            <div className="page-subtitle">📅 {todayFull()}</div>
          </div>
          <button className={`shake-inline-btn ${shaking ? 'shaking' : ''}`} onClick={shakeIt}>
            <span style={{fontSize:18,display:'inline-block'}}>🎲</span>
            <span>{shaking ? '摇中...' : '摇一摇'}</span>
          </button>
        </div>
      </div>

      {/* 搜索栏 */}
      <div className="search-bar">
        <span style={{fontSize:18}}>🔍</span>
        <input placeholder="搜索菜品..." value={search} onChange={e => setSearch(e.target.value)} />
        {search && <span style={{cursor:'pointer',color:'var(--text-3)',fontSize:18}} onClick={() => setSearch('')}>×</span>}
      </div>

      {/* 分类Tab */}
      <div className="tab-bar">
        {CATEGORIES.map(cat => (
          <div key={cat.id} className={`tab-chip ${activeCat === cat.id ? 'active' : ''}`} onClick={() => setActiveCat(cat.id)}>
            {cat.icon} {cat.name}
          </div>
        ))}
      </div>

      {/* 口味标签筛选 */}
      <div className="tab-bar" style={{paddingBottom: 8}}>
        <div className={`tab-chip ${!activeTag ? 'active' : ''}`} onClick={() => setActiveTag(null)} style={{fontSize:12,padding:'4px 12px'}}>不限口味</div>
        {TASTE_TAGS.map(t => (
          <div key={t} className={`tab-chip ${activeTag === t ? 'active' : ''}`} onClick={() => setActiveTag(activeTag === t ? null : t)} style={{fontSize:12,padding:'4px 12px'}}>
            #{t}
          </div>
        ))}
      </div>

      {/* 摇一摇结果 */}
      {shakeResult && (
        <div style={{padding:'0 20px 12px'}}>
          <div className="shake-result-card">
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
              <div style={{fontWeight:700,fontSize:14}}>🎲 今天就这桌？</div>
              <div style={{display:'flex',gap:8}}>
                <button className="btn-outline" style={{padding:'4px 12px',fontSize:12,borderRadius:14}} onClick={shakeIt}>再摇一次</button>
                <button className="btn-outline" style={{padding:'4px 12px',fontSize:12,borderRadius:14,color:'var(--text-3)',borderColor:'var(--text-3)'}} onClick={() => setShakeResult(null)}>取消</button>
              </div>
            </div>
            {shakeResult.map(d => (
              <div key={d.id} className="shake-dish">
                <div className="shake-dish-emoji">{d.emoji}</div>
                <div className="shake-dish-info">
                  <div className="shake-dish-name">{d.name} {d.spicy > 0 && <SpicyTag level={d.spicy} />}</div>
                  <div className="shake-dish-cat">{CATEGORIES.find(c => c.id === d.categoryId)?.name}</div>
                </div>
              </div>
            ))}
            <button className="btn-primary" style={{marginTop:12,padding:'10px'}} onClick={acceptShake}>👍 就这桌！全部加入菜单</button>
          </div>
        </div>
      )}

      {/* 菜品数量 */}
      <div style={{padding:'0 20px 10px',fontSize:13,color:'var(--text-3)'}}>
        共 {filtered.length} 道菜
      </div>

      {/* 菜品网格 */}
      {filtered.length === 0 ? (
        <div className="empty-state"><div className="emoji">🔍</div><p>没有找到菜品</p></div>
      ) : (
        <div className="dish-grid">
          {filtered.map(dish => {
            const inMenu = isInMenu(dish.id);
            const v = getVote(dish.id);
            const recentDays = recentMap[dish.id];
            const showRecent = recentDays !== undefined && recentDays <= 3;
            return (
              <div key={dish.id} className="dish-card">
                {inMenu && <div className="dish-badge">✓ 已选</div>}
                {showRecent && !inMenu && (
                  <div className="dish-recent-warn">
                    {recentDays === 0 ? '今天吃过' : `${recentDays}天前吃过`}
                  </div>
                )}
                <div className="dish-img">
                  {dish.image
                    ? <img src={dish.image} alt={dish.name} style={{width:'100%',height:'100%',objectFit:'cover'}} />
                    : dish.emoji}
                  {v.upCount >= 2 ? (
                    <div className="dish-both-want">💕 两人都想吃</div>
                  ) : v.iVotedUp ? (
                    <div className="dish-i-want">👍 你想吃</div>
                  ) : v.upCount === 1 ? (
                    <div className="dish-i-want" style={{background:'rgba(24,144,255,0.92)'}}>👍 TA想吃</div>
                  ) : null}
                </div>
                <div className="dish-info">
                  <div className="dish-name">{dish.name}</div>
                  <div className="dish-meta">
                    <span className="dish-cat">{CATEGORIES.find(c=>c.id===dish.categoryId)?.icon} {CATEGORIES.find(c=>c.id===dish.categoryId)?.name}</span>
                    {dish.spicy > 0 && <SpicyTag level={dish.spicy} />}
                    {(dish.tags || []).slice(0,1).map(t => (
                      <span key={t} className="tag-mini">#{t}</span>
                    ))}
                  </div>
                  <div className="dish-actions">
                    <div className="dish-vote">
                      <span
                        className={`vote-btn up ${v.iVotedUp ? 'active' : ''}`}
                        onClick={(e) => { e.stopPropagation(); handleVote(dish.id, 'up'); }}
                      >👍 {v.upCount || ''}</span>
                      <span
                        className={`vote-btn down ${v.iVotedDown ? 'active' : ''}`}
                        onClick={(e) => { e.stopPropagation(); handleVote(dish.id, 'down'); }}
                      >👎 {v.downCount || ''}</span>
                    </div>
                    <button
                      className={`btn-add ${inMenu ? 'added' : ''}`}
                      onClick={() => toggleMenu(dish)}
                    >
                      {inMenu ? '✓' : '+'}
                    </button>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* 悬浮购物栏 */}
      {todayMenu.length > 0 && (
        <div className="float-bar">
          <div className="float-bar-left">
            <div className="float-count">{todayMenu.length}</div>
            <div className="float-label">已选 {todayMenu.length} 道菜</div>
          </div>
          <button className="float-btn" onClick={() => goPage && goPage('today')}>
            查看菜单
          </button>
        </div>
      )}
    </div>
  );
}

  const setRating = (date, rating) => {

  return (
    <div className="page-scroll">
      <div className="page-header">
        <div className="page-title">食记 📖</div>
        <div className="page-subtitle">共 {history.length} 天的记录</div>
      </div>

          const chefMember = members.find(m => m.id === h.chef);

            <div key={h.date} className="history-item">

                <div>
                  <div className="history-date">📅 {h.date}</div>
                  <div style={{fontSize:12,color:'var(--text-3)',marginTop:2}}>
                    {chefMember && `👨‍🍳 ${chefMember.name} 主厨`}
                    {chefMember && h.savedBy && ' · '}
                    {h.savedBy && `${h.savedBy} 保存`}
                  </div>
                </div>
                <div style={{display:'flex',alignItems:'center',gap:8}}>
                  <div className="history-count">{h.dishes.length} 道菜</div>
                  <span style={{color:'var(--text-3)',fontSize:14,transform:expanded===h.date?'rotate(180deg)':'none',transition:'0.2s'}}>▼</span>
                </div>
              </div>
              {expanded === h.date && (
                <>
                  <div className="history-dishes">
                    {h.dishes.map(d => (
                      <span key={d.id} className="dish-tag">{d.emoji} {d.name}</span>
                    ))}
                  </div>
                  <div className="history-rating">
                    <span style={{fontSize:13,color:'var(--text-2)',fontWeight:600}}>这桌怎么样：</span>
                    {[1,2,3,4,5].map(n => (
                      <button key={n} className={`star-btn ${(h.rating||0) >= n ? 'filled' : ''}`} onClick={() => setRating(h.date, n)}>
                        ⭐
                      </button>
                    ))}
                    {h.rating > 0 && <span className="history-rating-label">{h.rating} / 5</span>}
                  </div>
                </>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ===== 图片压缩工具 =====
function compressImage(file, maxW = 600) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const scale = Math.min(1, maxW / Math.max(img.width, img.height));
        const w = Math.round(img.width * scale);
        const h = Math.round(img.height * scale);
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', 0.82));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

const AVATAR_EMOJIS = ['👨‍🍳','👩‍🍳','😊','😄','🧑','👴','👵','🧓','🧑‍🦱','🧑‍🦳','🧑‍🦲','😎','🤗','😋','🥰','🤩','👶','🧒','👧','👦'];

// ===== 厨房管理页 =====
function KitchenPage({ showToast }) {
  const [modal, setModal] = useState(null);
  const [dishes, setDishes] = useState(storage.get('fam_dishes', SAMPLE_DISHES));
  const [userData, setUserData] = useState(storage.get('fam_user', {}));
  const kitchen = storage.get('fam_kitchen', {});
  const members = storage.get('fam_members', []);
  const isAdmin = userData.role === 'admin';

  const [newDish, setNewDish] = useState({ name: '', categoryId: 'meat', emoji: '🍖', ingredients: '', image: '', spicy: 0, tags: [] });
  const [dishImgLoading, setDishImgLoading] = useState(false);
  const dishImgInputRef = useRef(null);
  const EMOJIS = ['🍖','🥩','🐟','🍗','🦐','🥬','🥦','🍅','🧅','🥚','🧆','🍲','🍜','🍚','🥘','🥗','🥤','🍺','☕','🥛','🍰','🍮','🍦','🍓'];

  const [avatarTab, setAvatarTab] = useState('emoji');
  const [avatarPreview, setAvatarPreview] = useState(userData.avatarImg || '');
  const [avatarEmoji, setAvatarEmoji] = useState(userData.emoji || '😊');
  const avatarInputRef = useRef(null);

  const handleDishImageChange = async (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    if (file.size > 15 * 1024 * 1024) { showToast('图片太大，请选15MB以内的图片'); return; }
    setDishImgLoading(true);
    try {
      const compressed = await compressImage(file, 600);
      setNewDish(prev => ({ ...prev, image: compressed }));
    } catch { showToast('图片处理失败，请重试'); }
    setDishImgLoading(false);
    e.target.value = '';
  };

  const handleAvatarImageChange = async (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    if (file.size > 15 * 1024 * 1024) { showToast('图片太大，请选15MB以内的图片'); return; }
    try {
      const compressed = await compressImage(file, 400);
      setAvatarPreview(compressed);
    } catch { showToast('图片处理失败，请重试'); }
    e.target.value = '';
  };

  const saveAvatar = () => {
    const updated = {
      ...userData,
      emoji: avatarEmoji,
      avatarImg: avatarTab === 'photo' ? avatarPreview : '',
    };
    storage.set('fam_user', updated);
    // 同步更新成员列表中的我
    const ms = storage.get('fam_members', []);
    const updatedMs = ms.map(m => m.id === userData.id ? { ...m, emoji: avatarEmoji, avatarImg: updated.avatarImg } : m);
    storage.set('fam_members', updatedMs);
    setUserData(updated);
    setModal(null);
    showToast('✓ 头像已更新');
  };

  const addDish = () => {
    if (!newDish.name.trim()) { showToast('请输入菜品名称'); return; }
    const dish = {
      id: Date.now(),
      name: newDish.name.trim(),
      categoryId: newDish.categoryId,
      emoji: newDish.emoji,
      image: newDish.image || '',
      spicy: newDish.spicy || 0,
      tags: newDish.tags || [],
      ingredients: newDish.ingredients.split(/[，,]/).map(s=>s.trim()).filter(Boolean),
    };
    const updated = [...dishes, dish];
    storage.set('fam_dishes', updated);
    setDishes(updated);
    setNewDish({ name: '', categoryId: 'meat', emoji: '🍖', ingredients: '', image: '', spicy: 0, tags: [] });
    setModal(null);
    showToast('✓ 菜品已添加');
  };

  const deleteDish = (id) => {
    if (!window.confirm('确定删除这道菜吗？')) return;
    const updated = dishes.filter(d => d.id !== id);
    storage.set('fam_dishes', updated);
    setDishes(updated);
    showToast('已删除');
  };

  const toggleNewDishTag = (tag) => {
    const has = (newDish.tags || []).includes(tag);
    const updated = has ? newDish.tags.filter(t => t !== tag) : [...(newDish.tags||[]), tag];
    setNewDish({ ...newDish, tags: updated });
  };

  const currentAvatarImg = userData.avatarImg;
  const currentAvatarEmoji = userData.emoji || '😊';

  return (
    <div className="page-scroll">

      {/* 个人信息 */}
      <div style={{padding:'20px 20px 0',display:'flex',alignItems:'center',gap:16,marginBottom:20}}>
        <div
          className="kitchen-avatar"
          style={{cursor:'pointer',position:'relative',overflow:'hidden',border:'2.5px solid var(--primary-soft)'}}
          onClick={() => { setAvatarTab('emoji'); setAvatarPreview(userData.avatarImg||''); setAvatarEmoji(userData.emoji||'😊'); setModal('avatar'); }}
        >
          {currentAvatarImg
            ? <img src={currentAvatarImg} alt="头像" style={{width:'100%',height:'100%',objectFit:'cover'}} />
            : currentAvatarEmoji}
          <div style={{position:'absolute',bottom:0,left:0,right:0,background:'rgba(0,0,0,0.3)',color:'white',fontSize:10,textAlign:'center',padding:'3px 0',lineHeight:1.2}}>
            换头像
          </div>
        </div>
        <div>
          <div style={{fontSize:18,fontWeight:700}}>{userData.name || '家庭成员'}</div>
          <div style={{display:'flex',gap:6,marginTop:4}}>
            <span className={isAdmin?'tag-admin':'tag-member'}>{isAdmin?'管理员':'成员'}</span>
            <span style={{fontSize:12,color:'var(--text-3)'}}>{kitchen.name}</span>
          </div>
        </div>
      </div>

      {/* 厨房管理（仅管理员）*/}
      {isAdmin && (
        <>
          <div style={{padding:'0 20px 8px',fontSize:13,color:'var(--text-3)',fontWeight:600}}>厨房管理</div>
          <div className="kitchen-card">
            <div className="kitchen-row" onClick={() => setModal('addDish')}>
              <span className="kitchen-row-icon">🍳</span>
              <span className="kitchen-row-text">添加菜品</span>
              <span className="kitchen-row-badge">{dishes.length} 道</span>
              <span className="kitchen-row-arrow">›</span>
            </div>
            <div className="kitchen-row" onClick={() => setModal('manageDishes')}>
              <span className="kitchen-row-icon">📋</span>
              <span className="kitchen-row-text">管理菜品</span>
              <span className="kitchen-row-arrow">›</span>
            </div>
            <div className="kitchen-row" onClick={() => setModal('invite')}>
              <span className="kitchen-row-icon">🔑</span>
              <span className="kitchen-row-text">邀请家人</span>
              <span className="kitchen-row-arrow">›</span>
            </div>
            <div className="kitchen-row" onClick={() => setModal('members')}>
              <span className="kitchen-row-icon">👨‍👩‍👧</span>
              <span className="kitchen-row-text">家庭成员</span>
              <span className="kitchen-row-badge">{members.length} 人</span>
              <span className="kitchen-row-arrow">›</span>
            </div>
          </div>
        </>
      )}

      <div style={{padding:'0 20px 8px',fontSize:13,color:'var(--text-3)',fontWeight:600}}>我的</div>
      <div className="kitchen-card">
        <div className="kitchen-row" onClick={() => { setAvatarTab('emoji'); setAvatarPreview(userData.avatarImg||''); setAvatarEmoji(userData.emoji||'😊'); setModal('avatar'); }}>
          <span className="kitchen-row-icon">🖼️</span>
          <span className="kitchen-row-text">更换头像</span>
          <span className="kitchen-row-arrow">›</span>
        </div>
        <div className="kitchen-row" onClick={() => { const favs = storage.get('fam_favorites',[]); showToast(`已收藏 ${favs.length} 道菜`); }}>
          <span className="kitchen-row-icon">❤️</span>
          <span className="kitchen-row-text">我的收藏</span>
          <span className="kitchen-row-badge">{storage.get('fam_favorites',[]).length} 道</span>
          <span className="kitchen-row-arrow">›</span>
        </div>
        <div className="kitchen-row" onClick={() => { if(window.confirm('确定退出并清除数据？')) { localStorage.clear(); location.reload(); } }}>
          <span className="kitchen-row-icon">🚪</span>
          <span className="kitchen-row-text" style={{color:'#999'}}>退出厨房</span>
          <span className="kitchen-row-arrow">›</span>
        </div>
      </div>

      <div style={{padding:'20px',fontSize:13,color:'var(--text-3)',textAlign:'center'}}>
        家厨点菜 · 让每天吃饭更快乐 🥢
      </div>

      {/* 更换头像 modal */}
      {modal === 'avatar' && (
        <div className="modal-overlay" onClick={() => setModal(null)}>
          <div className="modal-sheet" onClick={e => e.stopPropagation()}>
            <div className="modal-handle" />
            <div className="modal-title">更换头像</div>
            <div className="avatar-picker-wrap">
              <div className="avatar-large" onClick={() => avatarTab === 'photo' && avatarInputRef.current?.click()}>
                {avatarTab === 'photo' && avatarPreview
                  ? <img src={avatarPreview} alt="预览" />
                  : <span style={{fontSize:42}}>{avatarEmoji}</span>}
                {avatarTab === 'photo' && (
                  <div className="avatar-large-overlay">📷</div>
                )}
              </div>
              <div style={{fontSize:12,color:'var(--text-3)'}}>
                {avatarTab === 'photo' ? '点击头像更换照片' : '在下方选择一个表情'}
              </div>
            </div>
            <div className="avatar-tab-row" style={{marginBottom:16}}>
              <div className={`avatar-tab ${avatarTab==='emoji'?'active':''}`} onClick={() => setAvatarTab('emoji')}>😊 表情头像</div>
              <div className={`avatar-tab ${avatarTab==='photo'?'active':''}`} onClick={() => setAvatarTab('photo')}>📷 上传照片</div>
            </div>
            {avatarTab === 'emoji' && (
              <div className="emoji-grid" style={{marginBottom:20}}>
                {AVATAR_EMOJIS.map(em => (
                  <div key={em} className={`emoji-opt ${avatarEmoji===em?'selected':''}`} onClick={() => setAvatarEmoji(em)}>
                    {em}
                  </div>
                ))}
              </div>
            )}
            {avatarTab === 'photo' && (
              <div style={{marginBottom:20}}>
                <input
                  ref={avatarInputRef}
                  type="file"
                  accept="image/*"
                  className="file-input-hidden"
                  onChange={handleAvatarImageChange}
                />
                {avatarPreview ? (
                  <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:12}}>
                    <div style={{width:120,height:120,borderRadius:'50%',overflow:'hidden',border:'3px solid var(--primary-soft)'}}>
                      <img src={avatarPreview} style={{width:'100%',height:'100%',objectFit:'cover'}} />
                    </div>
                    <button className="btn-outline" onClick={() => avatarInputRef.current?.click()}>
                      重新选择照片
                    </button>
                  </div>
                ) : (
                  <div className="img-upload-box" style={{aspectRatio:'unset',height:140}} onClick={() => avatarInputRef.current?.click()}>
                    <div className="img-upload-icon">📷</div>
                    <div className="img-upload-hint">点击选择照片或拍照</div>
                    <div style={{fontSize:12,color:'var(--text-3)'}}>支持 JPG / PNG / HEIC</div>
                  </div>
                )}
              </div>
            )}
            <button className="btn-primary" onClick={saveAvatar}>保存头像</button>
          </div>
        </div>
      )}

      {/* 添加菜品 modal */}
      {modal === 'addDish' && (
        <div className="modal-overlay" onClick={() => setModal(null)}>
          <div className="modal-sheet" onClick={e => e.stopPropagation()}>
            <div className="modal-handle" />
            <div className="modal-title">添加新菜品</div>

            <div className="input-group">
              <div className="input-label">菜品图片（可选）</div>
              <input
                ref={dishImgInputRef}
                type="file"
                accept="image/*"
                className="file-input-hidden"
                onChange={handleDishImageChange}
              />
              <div
                className={`img-upload-box ${newDish.image ? 'has-img' : ''}`}
                style={{maxWidth:160,aspectRatio:'1'}}
                onClick={() => dishImgInputRef.current?.click()}
              >
                {dishImgLoading ? (
                  <div style={{color:'var(--text-3)',fontSize:13}}>处理中…</div>
                ) : newDish.image ? (
                  <>
                    <img src={newDish.image} alt="菜品图" />
                    <div className="img-upload-change">点击重新选择</div>
                  </>
                ) : (
                  <>
                    <div className="img-upload-icon">🖼️</div>
                    <div className="img-upload-hint">点击上传图片</div>
                    <div style={{fontSize:11,color:'var(--text-3)'}}>相册 / 拍照均可</div>
                  </>
                )}
              </div>
            </div>

            <div className="input-group">
              <div className="input-label">菜品名称 *</div>
              <input className="input-field" placeholder="例：红烧肉" value={newDish.name} onChange={e=>setNewDish({...newDish,name:e.target.value})} />
            </div>

            <div className="input-group">
              <div className="input-label">选择分类</div>
              <div className="cat-select-grid">
                {CATEGORIES.filter(c=>c.id!=='all').map(cat => (
                  <div key={cat.id} className={`cat-option ${newDish.categoryId===cat.id?'selected':''}`} onClick={() => setNewDish({...newDish,categoryId:cat.id})}>
                    <div style={{fontSize:18}}>{cat.icon}</div>
                    <div style={{marginTop:2}}>{cat.name}</div>
                  </div>
                ))}
              </div>
            </div>

            <div className="input-group">
              <div className="input-label">辣度</div>
              <div className="spicy-row">
                {SPICY_LEVELS.map(s => (
                  <div key={s.level} className={`spicy-opt ${newDish.spicy===s.level?'selected':''}`} onClick={() => setNewDish({...newDish, spicy:s.level})}>
                    {s.icon || '○'} {s.name}
                  </div>
                ))}
              </div>
            </div>

            <div className="input-group">
              <div className="input-label">口味标签（可多选）</div>
              <div className="tag-pick-row">
                {TASTE_TAGS.map(t => (
                  <div key={t} className={`tag-pick ${(newDish.tags||[]).includes(t)?'selected':''}`} onClick={() => toggleNewDishTag(t)}>
                    {t}
                  </div>
                ))}
              </div>
            </div>

            <div className="input-group">
              <div className="input-label">备用 Emoji 图标</div>
              <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
                {EMOJIS.map(em => (
                  <div key={em} onClick={() => setNewDish({...newDish,emoji:em})}
                    style={{fontSize:24,cursor:'pointer',padding:6,borderRadius:8,
                      background:newDish.emoji===em?'var(--primary-light)':'transparent',
                      border:newDish.emoji===em?'1.5px solid var(--primary)':'1.5px solid transparent'}}>
                    {em}
                  </div>
                ))}
              </div>
            </div>

            <div className="input-group">
              <div className="input-label">食材（逗号分隔，自动汇总成购物清单）</div>
              <input className="input-field" placeholder="例：猪肉，酱油，冰糖" value={newDish.ingredients} onChange={e=>setNewDish({...newDish,ingredients:e.target.value})} />
            </div>

            <button className="btn-primary" onClick={addDish} disabled={dishImgLoading}>
              {dishImgLoading ? '图片处理中…' : '添加菜品'}
            </button>
          </div>
        </div>
      )}

      {/* 管理菜品 modal */}
      {modal === 'manageDishes' && (
        <div className="modal-overlay" onClick={() => setModal(null)}>
          <div className="modal-sheet" onClick={e => e.stopPropagation()}>
            <div className="modal-handle" />
            <div className="modal-title">菜品管理（{dishes.length} 道）</div>
            <div style={{maxHeight:'62vh',overflowY:'auto'}}>
              {dishes.map(d => (
                <div key={d.id} className="member-row">
                  {d.image
                    ? <div style={{width:40,height:40,borderRadius:8,overflow:'hidden',flexShrink:0}}>
                        <img src={d.image} style={{width:'100%',height:'100%',objectFit:'cover'}} />
                      </div>
                    : <span style={{fontSize:28,flexShrink:0}}>{d.emoji}</span>}
                  <div className="member-name">
                    <div style={{fontWeight:600}}>{d.name} {d.spicy > 0 && <SpicyTag level={d.spicy} />}</div>
                    <div style={{fontSize:12,color:'var(--text-3)'}}>
                      {CATEGORIES.find(c=>c.id===d.categoryId)?.name}
                      {(d.tags||[]).length > 0 && ' · ' + d.tags.join('/')}
                    </div>
                  </div>
                  <button onClick={() => deleteDish(d.id)} style={{background:'none',border:'none',color:'#ccc',fontSize:20,cursor:'pointer',padding:'4px'}}>🗑️</button>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}

      {/* 邀请码 modal */}
      {modal === 'invite' && (
        <div className="modal-overlay" onClick={() => setModal(null)}>
          <div className="modal-sheet" onClick={e => e.stopPropagation()}>
            <div className="modal-handle" />
            <div className="modal-title">邀请家人加入</div>
            <div className="invite-code-box">
              <div style={{fontSize:13,color:'var(--text-3)',marginBottom:8}}>把邀请码发给家人</div>
              <div className="invite-code">{kitchen.inviteCode}</div>
              <div className="invite-hint">家人打开应用后输入此邀请码即可加入</div>
            </div>
            <button className="btn-primary" onClick={() => { navigator.clipboard?.writeText(kitchen.inviteCode); showToast('✓ 邀请码已复制'); }}>
              复制邀请码
            </button>
          </div>
        </div>
      )}

      {/* 成员 modal */}
      {modal === 'members' && (
        <div className="modal-overlay" onClick={() => setModal(null)}>
          <div className="modal-sheet" onClick={e => e.stopPropagation()}>
            <div className="modal-handle" />
            <div className="modal-title">家庭成员（{members.length} 人）</div>
            {members.map(m => (
              <div key={m.id} className="member-row">
                <div className="member-avatar">
                  {m.avatarImg
                    ? <img src={m.avatarImg} style={{width:'100%',height:'100%',objectFit:'cover',borderRadius:'50%'}} />
                    : m.emoji}
                </div>
                <div className="member-name">{m.name}</div>
                <span className={m.role==='admin'?'tag-admin':'tag-member'}>{m.role==='admin'?'管理员':'成员'}</span>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

// ===== 主应用 =====
function App() {
  const [inited, setInited] = useState(!!storage.get('fam_user', null));
  const [page, setPage] = useState('today');
  const [toast, setToast] = useState('');
  const toastTimer = useRef(null);

  const showToast = useCallback((msg) => {
    setToast(msg);
    clearTimeout(toastTimer.current);
    toastTimer.current = setTimeout(() => setToast(''), 2100);
  }, []);

  const goPage = useCallback((p) => setPage(p), []);

  if (!inited) return (
    <div style={{display:'flex',flexDirection:'column',height:'100%',maxWidth:430,margin:'0 auto',background:'white'}}>
      <OnboardPage onDone={() => setInited(true)} />
    </div>
  );

  const NAV = [
    { id: 'today', icon: '🏠', label: '今日' },
    { id: 'order', icon: '🍽️', label: '点菜' },
    { id: 'history', icon: '📖', label: '食记' },
    { id: 'kitchen', icon: '👨‍🍳', label: '厨房' },
  ];

  return (
    <>
      <Toast msg={toast} />
      {page === 'today' && <TodayPage showToast={showToast} goPage={goPage} />}
      {page === 'order' && <OrderPage showToast={showToast} goPage={goPage} />}
      {page === 'history' && <HistoryPage showToast={showToast} />}
      {page === 'kitchen' && <KitchenPage showToast={showToast} />}
      <div className="bottom-nav">
        {NAV.map(n => (
          <div key={n.id} className={`nav-item ${page === n.id ? 'active' : ''}`} onClick={() => setPage(n.id)}>
            <span className="nav-icon">{n.icon}</span>
            <span className="nav-label">{n.label}</span>
          </div>
        ))}
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
